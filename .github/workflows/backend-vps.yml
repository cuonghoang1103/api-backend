name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            # Stop containers first so bind mounts release the dirs
            docker compose -f /opt/cuonghoangdev/docker-compose.yml down 2>/dev/null || true
            # Delete data dirs owned by root (docker creates them)
            rm -rf /opt/cuonghoangdev/{postgres,redis,uploads}
          '
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude '*.log' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/cuonghoangdev

            # Create data dirs BEFORE docker compose up (bind mounts must exist)
            mkdir -p /opt/cuonghoangdev/{postgres,redis,uploads}

            # Build and start all services

            # Wait for services to be healthy
            sleep 15

            # Show status
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=50 backend
            docker compose -f docker-compose.yml logs --tail=20 frontend
          '
