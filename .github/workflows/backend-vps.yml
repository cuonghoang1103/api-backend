name: Deploy Backend to VPS

# Manual-only since 2026-07-06: deploys go through `bash deploy.sh` from the
# local machine (see CLAUDE.md "STANDARD deploy + push flow"). Auto-deploy on
# push raced deploy-ghcr.yml into prod outages (2026-07-03, 2026-07-06).
on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n    ConnectTimeout 30\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Verify SSH connection
        run: |
          ssh vps "echo SSH_OK"

      - name: Build backend TypeScript (compiled on CI, no Docker cache issues)
        run: |
          echo "--- Installing backend deps ---"
          npm ci --include=dev 2>&1 | tail -3
          echo "--- Generating Prisma client ---"
          npx prisma generate 2>&1 | tail -3
          echo "--- Compiling TypeScript ---"
          npx tsc 2>&1
          echo "--- Verify compiled code ---"
          grep -c "router.get.*/projects" dist/routes/admin.routes.js && echo "[OK] admin/projects route compiled!"
          grep -q "openrouter.ai" dist/services/aiProviders.js && echo "[OK] OpenRouter URL in AI service!" || echo "[WARN] OpenRouter URL not found, but may be OK if env var differs"

      - name: Build Next.js frontend
        run: |
          cd frontend
          npm ci
          NEXT_PUBLIC_BUILD_ID=$(date +%s) npm run build
          echo "--- Built .next/ contents ---"
          ls .next/static/css/*.css 2>/dev/null | head -3

      - name: Sync project to VPS
        run: |
          rsync -az --delete --no-perms --no-owner --no-group --omit-dir-times \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            --exclude 'setup-swap.sh' \
            --exclude '.env' \
            ./ -e "ssh -F $HOME/.ssh/config" \
            "vps:/opt/cuonghoangdev/" || echo "Rsync completed with warnings"

      - name: Deploy frontend artifacts to VPS
        run: |
          echo "--- Streaming frontend build artifacts to VPS ---"
          ssh -F $HOME/.ssh/config vps "rm -rf /opt/cuonghoangdev/frontend/.next /opt/cuonghoangdev/frontend/node_modules && mkdir -p /opt/cuonghoangdev/frontend" || true
          (cd frontend && tar -czf - .next/ node_modules/ package.json package-lock.json) | \
            ssh -F $HOME/.ssh/config vps "cd /opt/cuonghoangdev/frontend && tar -xzf -"
          echo "--- Frontend artifacts deployed ---"

      - name: Create .env on VPS if missing
        run: |
          ssh vps "if [ ! -f /opt/cuonghoangdev/.env ]; then \
              cp /opt/cuonghoangdev/vps-deploy/.env.example /opt/cuonghoangdev/.env; \
              echo '[CREATED] .env from .env.example'; \
            else \
              echo '[SKIP] .env already exists'; \
            fi"

      - name: Update .env on VPS with secrets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          SIGNED_URL_SECRET: ${{ secrets.SIGNED_URL_SECRET }}
        run: |
          if grep -q "^YOUTUBE_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
            ssh vps "sed -i 's|^YOUTUBE_API_KEY=.*|YOUTUBE_API_KEY=${YOUTUBE_API_KEY}|' /opt/cuonghoangdev/.env"
          else
            ssh vps "echo 'YOUTUBE_API_KEY=${YOUTUBE_API_KEY}' >> /opt/cuonghoangdev/.env"
          fi
          if [ -n "$GROQ_API_KEY" ]; then
            if grep -q "^GROQ_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^GROQ_API_KEY=.*|GROQ_API_KEY=${GROQ_API_KEY}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'GROQ_API_KEY=${GROQ_API_KEY}' >> /opt/cuonghoangdev/.env"
            fi
          fi
          if grep -q "^OPENROUTER_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
            ssh vps "sed -i 's|^OPENROUTER_API_KEY=.*|OPENROUTER_API_KEY=${OPENROUTER_API_KEY}|' /opt/cuonghoangdev/.env"
          else
            ssh vps "echo 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}' >> /opt/cuonghoangdev/.env"
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            if grep -q "^OPENAI_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'OPENAI_API_KEY=${OPENAI_API_KEY}' >> /opt/cuonghoangdev/.env"
            fi
          fi
          # Required secrets - use GitHub secret if set, otherwise keep existing value in .env
          # (The .env was originally set up with strong random values that we don't want
          # to overwrite with weak defaults on every deploy.)
          if [ -n "$JWT_SECRET" ]; then
            if grep -q "^JWT_SECRET=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'JWT_SECRET=${JWT_SECRET}' >> /opt/cuonghoangdev/.env"
            fi
          fi
          if [ -n "$JWT_REFRESH_SECRET" ]; then
            if grep -q "^JWT_REFRESH_SECRET=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^JWT_REFRESH_SECRET=.*|JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}' >> /opt/cuonghoangdev/.env"
            fi
          fi
          # SIGNED_URL_SECRET is REQUIRED for backend to start
          # Generate random 64-char hex string if not set and not in .env
          if grep -q "^SIGNED_URL_SECRET=" /opt/cuonghoangdev/.env 2>/dev/null; then
            if [ -n "$SIGNED_URL_SECRET" ]; then
              ssh vps "sed -i 's|^SIGNED_URL_SECRET=.*|SIGNED_URL_SECRET=${SIGNED_URL_SECRET}|' /opt/cuonghoangdev/.env"
            fi
          else
            if [ -n "$SIGNED_URL_SECRET" ]; then
              ssh vps "echo 'SIGNED_URL_SECRET=${SIGNED_URL_SECRET}' >> /opt/cuonghoangdev/.env"
            else
              # Generate a random 64-char hex string on VPS
              SIGNED_URL_RAND=$(openssl rand -hex 32)
              ssh vps "echo 'SIGNED_URL_SECRET=${SIGNED_URL_RAND}' >> /opt/cuonghoangdev/.env"
              echo "[GENERATED] SIGNED_URL_SECRET"
            fi
          fi
          # COOKIE_SECRET is REQUIRED for backend to start
          if grep -q "^COOKIE_SECRET=" /opt/cuonghoangdev/.env 2>/dev/null; then
            if [ -n "$COOKIE_SECRET" ]; then
              ssh vps "sed -i 's|^COOKIE_SECRET=.*|COOKIE_SECRET=${COOKIE_SECRET}|' /opt/cuonghoangdev/.env"
            fi
          else
            if [ -n "$COOKIE_SECRET" ]; then
              ssh vps "echo 'COOKIE_SECRET=${COOKIE_SECRET}' >> /opt/cuonghoangdev/.env"
            else
              COOKIE_RAND=$(openssl rand -hex 32)
              ssh vps "echo 'COOKIE_SECRET=${COOKIE_RAND}' >> /opt/cuonghoangdev/.env"
              echo "[GENERATED] COOKIE_SECRET"
            fi
          fi
          if [ -n "$POSTGRES_PASSWORD" ]; then
            if grep -q "^POSTGRES_PASSWORD=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}' >> /opt/cuonghoangdev/.env"
            fi
          fi
          # Verify required secrets are present
          echo "=== Verifying required secrets ==="
          ssh vps "grep -E '^(JWT_SECRET|JWT_REFRESH_SECRET|SIGNED_URL_SECRET|COOKIE_SECRET)=' /opt/cuonghoangdev/.env"

      - name: Upload and run swap setup script
        continue-on-error: true
        run: |
          chmod +x setup-swap.sh
          scp -F ~/.ssh/config setup-swap.sh "vps:/tmp/setup-swap.sh" || true
          ssh vps "sudo bash /tmp/setup-swap.sh 2>/dev/null; rm -f /tmp/setup-swap.sh" || true

      - name: Upload deploy script
        run: |
          chmod +x scripts/deploy-vps.sh
          scp -F ~/.ssh/config scripts/deploy-vps.sh "vps:/opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Deploy backend (inject fresh dist into container)
        run: |
          echo "--- Copying compiled dist to VPS ---"
          ssh vps "mkdir -p /opt/cuonghoangdev/dist_fresh"
          (tar -czf - dist/) | ssh -F $HOME/.ssh/config vps "cd /opt/cuonghoangdev && tar -xzf -"
          echo "--- Sync prisma/ folder into container (NEW models/columns) ---"
          # The host's /opt/cuonghoangdev/prisma/ was rsync'd from CI,
          # but the Docker image baked in an older prisma/ at build
          # time. We copy the new prisma/ on top so that
          # `prisma generate` and `prisma db push` inside the container
          # see the current schema.
          ssh vps "docker cp /opt/cuonghoangdev/prisma/. cuonghoangdev_backend:/app/prisma/"
          echo "--- Inject dist into running backend container ---"
          ssh vps "docker cp /opt/cuonghoangdev/dist/. cuonghoangdev_backend:/app/dist/"
          echo "--- Regenerate Prisma Client inside container ---"
          # The CI-side `npx prisma generate` only updates the host's
          # client; the running container still has the OLD client
          # baked in at image build time. Without this step, any new
          # model/field introduced in schema.prisma will cause
          # "Cannot read properties of undefined (reading 'findMany')"
          # errors when the new code touches prisma.<newModel>.
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma generate' 2>&1" | tail -5
          echo "--- Apply pending migrations (migrate deploy) ---"
          # SECURITY/SAFETY: use `migrate deploy` (applies only pending
          # migrations via _prisma_migrations history) — NEVER
          # `db push --accept-data-loss`, which can silently DROP
          # columns/tables to match the schema. `migrate deploy` is
          # idempotent; if it fails, the step fails loudly and a human
          # follows the Migration Failure Protocol (CLAUDE.md).
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma migrate deploy'"
          echo "--- Restarting backend to load new code + new Prisma client ---"
          ssh vps "docker restart cuonghoangdev_backend"
          echo "--- Waiting for reload ---"
          ssh vps "for i in \$(seq 1 12); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend reloaded!'
              break
            fi
            echo \"Reload... (\$i/12)\"
            sleep 5
          done"
          echo "--- Verify admin/projects route ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -s http://localhost:3001/api/v1/admin/projects 2>&1'"

      - name: Sync .next/ into frontend container
        run: |
          # IMPORTANT: copy BOTH `static/` (CSS + JS chunks for the
          # browser) AND `server/` (the SSR pages + the manifest),
          # PLUS the root-level manifest files (BUILD_ID, build-
          # manifest.json, etc.) at the .next/ root. The Next.js
          # production server reads BUILD_ID on startup to locate
          # the build — without it the container boots and crashes
          # with "Could not find a production build in the ./.next
          # directory". We use `docker cp` (run on the VPS, not the
          # runner) so the files land inside the container's
          # filesystem.
          ssh -F $HOME/.ssh/config vps "docker exec -u root cuonghoangdev_frontend sh -c 'rm -rf /app/.next && mkdir -p /app/.next/static /app/.next/server'"
          # Copy the root-level manifest files (everything except
          # the heavy `cache/`, `trace/`, and `types/` dirs).
          ssh -F $HOME/.ssh/config vps "cd /opt/cuonghoangdev/frontend/.next && for f in BUILD_ID app-build-manifest.json app-path-routes-manifest.json build-manifest.json export-marker.json images-manifest.json next-minimal-server.js.nft.json next-server.js.nft.json package.json prerender-manifest.json react-loadable-manifest.json required-server-files.json routes-manifest.json; do docker cp \$f cuonghoangdev_frontend:/app/.next/\$f; done"
          # Copy the browser-facing static assets.
          ssh -F $HOME/.ssh/config vps "docker cp /opt/cuonghoangdev/frontend/.next/static/. cuonghoangdev_frontend:/app/.next/static/"
          # Copy the server-rendered app + chunks manifests.
          ssh -F $HOME/.ssh/config vps "docker cp /opt/cuonghoangdev/frontend/.next/server/. cuonghoangdev_frontend:/app/.next/server/"
          ssh -F $HOME/.ssh/config vps "docker restart cuonghoangdev_frontend"

      - name: Setup cron jobs on VPS
        run: |
          ssh vps "
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts
            chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh 2>/dev/null || true
            chmod +x /opt/cuonghoangdev/scripts/restore-db.sh 2>/dev/null || true
            (crontab -l 2>/dev/null | grep -v backup-cron; \
              echo '0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1') | crontab -
            (crontab -l 2>/dev/null | grep -v monitor.sh; \
              echo '*/5 * * * * /opt/cuonghoangdev/scripts/monitor.sh >> /var/log/cuonghoangdev-monitor.log 2>&1') | crontab -
            echo 'Cron jobs:'
            crontab -l
          "
