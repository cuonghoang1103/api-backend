name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo SSH_OK"

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ -e "ssh -i ~/.ssh/deploy_key" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          KEY_FILE=~/.ssh/deploy_key
          HOST="$VPS_HOST"
          USER="$VPS_USER"

          # Get DB password locally (from docker-compose.yml on this machine)
          # Use line 1 only — grep may match multiple lines (including comments)
          DB_PASS=$(grep 'POSTGRES_PASSWORD' docker-compose.yml | grep -v '^#' | head -1 | sed "s/.*POSTGRES_PASSWORD:-\([^}]*\)}.*/\1/")
          DB_PASS="${DB_PASS:-123456}"

          # Run deploy script on VPS via SSH
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$USER@$HOST" "
            set -e
            cd /opt/cuonghoangdev

            mkdir -p nginx/ssl certbot/conf/live/cuongthai.com certbot/www postgres redis uploads backups scripts

            # SSL symlinks
            [ -f certbot/conf/archive/cuongthai.com/fullchain2.pem ] && { ln -sf fullchain2.pem certbot/conf/archive/cuongthai.com/fullchain.pem 2>/dev/null || true; }
            [ -f certbot/conf/archive/cuongthai.com/privkey2.pem ] && { ln -sf privkey2.pem certbot/conf/archive/cuongthai.com/privkey.pem 2>/dev/null || true; }

            # Stop all containers
            docker stop cuonghoangdev_nginx cuonghoangdev_frontend cuonghoangdev_backend cuonghoangdev_postgres cuonghoangdev_redis 2>/dev/null || true
            docker rm -f cuonghoangdev_nginx cuonghoangdev_frontend cuonghoangdev_backend cuonghoangdev_postgres cuonghoangdev_redis 2>/dev/null || true

            # Clean postgres data dir so it re-initializes with the new password
            # (Old data dir was created with a different POSTGRES_PASSWORD)
            rm -rf /opt/cuonghoangdev/postgres
            mkdir -p /opt/cuonghoangdev/postgres

            # Regenerate .env from .env.example
            rm -f .env
            cp .env.example .env 2>/dev/null || true

            # Fix DATABASE_URL: localhost:5433 -> postgres:5432 (Docker DNS)
            sed -i 's|localhost:5433|postgres:5432|g' .env
            sed -i '/^DATABASE_URL=/d' .env
            printf 'DATABASE_URL=postgresql://postgres:%s@postgres:5432/cuonghoangdev_db?schema=public\n' "$DB_PASS" >> .env
            echo 'DB_PASS='"$DB_PASS"

            # Run docker compose
            export POSTGRES_PASSWORD='$DB_PASS'
            docker compose -f docker-compose.yml build --pull --no-cache
            docker compose -f docker-compose.yml up -d

            # Wait for backend
            for i in \$(seq 1 36); do
              if docker exec cuonghoangdev_backend curl -sf http://localhost:3001/health 2>/dev/null | grep -q 'ok'; then
                echo '[OK] backend'
                break
              fi
              echo 'Waiting for backend... ('\$i'/36)'
              sleep 5
            done

            # DEBUG: Check actual DATABASE_URL inside container
            docker exec cuonghoangdev_backend sh -c 'echo "Container DATABASE_URL: \$DATABASE_URL"' || true
            docker exec cuonghoangdev_backend sh -c 'grep DATABASE_URL /app/.env 2>/dev/null || echo "No .env in /app/"' || true

            # Wait for nginx
            for i in \$(seq 1 24); do
              if docker exec cuonghoangdev_nginx wget -qO- http://localhost/ >/dev/null 2>&1; then
                echo '[OK] nginx'
                break
              fi
              echo 'Waiting for nginx... ('\$i'/24)'
              sleep 5
            done

            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=20 backend
          "

      - name: Create admin user on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$VPS_USER@$VPS_HOST" "
            set -e
            cd /opt/cuonghoangdev
            for i in \$(seq 1 30); do
              if docker exec cuonghoangdev_backend curl -sf http://localhost:3001/health 2>/dev/null | grep -q 'ok'; then
                echo 'Backend ready'
                break
              fi
              sleep 2
            done
            if [ -f scripts/seed-admin.cjs ]; then
              docker cp scripts/seed-admin.cjs cuonghoangdev_backend:/app/seed-admin.cjs
              docker exec cuonghoangdev_backend node seed-admin.cjs
              echo 'Admin setup done'
            fi
          "

      - name: Setup cron jobs on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$VPS_USER@$VPS_HOST" "
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts
            [ -f /opt/cuonghoangdev/scripts/backup-cron.sh ] && chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh
            [ -f /opt/cuonghoangdev/scripts/restore-db.sh ] && chmod +x /opt/cuonghoangdev/scripts/restore-db.sh
            (crontab -l 2>/dev/null | grep -v backup-cron; echo '0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1') | crontab -
            (crontab -l 2>/dev/null | grep -v monitor.sh; echo '*/5 * * * * /opt/cuonghoangdev/scripts/monitor.sh >> /var/log/cuonghoangdev-monitor.log 2>&1') | crontab -
            echo 'Cron jobs set up:'
            crontab -l
          "
