name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ -e "ssh -i ~/.ssh/deploy_key" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'set -e; cd /opt/cuonghoangdev; mkdir -p nginx/ssl certbot/conf/live/cuongthai.com certbot/www postgres redis uploads backups; echo "Dirs created"; if [ ! -f .env ] && [ -f .env.example ]; then cp .env.example .env; fi; echo "Env checked"; docker compose -f docker-compose.yml pull 2>/dev/null || true; docker stop cuonghoangdev_nginx cuonghoangdev_frontend cuonghoangdev_backend 2>/dev/null || true; docker rm cuonghoangdev_nginx cuonghoangdev_frontend cuonghoangdev_backend 2>/dev/null || true; docker compose -f docker-compose.yml up -d --build; echo "Containers started"; for i in $(seq 1 36); do if docker exec cuonghoangdev_backend wget -q -O- http://localhost:3001/health 2>/dev/null | grep -q "ok"; then echo "[OK] backend"; break; fi; sleep 5; done; for i in $(seq 1 36); do if docker exec cuonghoangdev_frontend wget -q -O- http://localhost:3000 2>/dev/null | grep -q ""; then echo "[OK] frontend"; break; fi; sleep 5; done; for i in $(seq 1 12); do if docker exec cuonghoangdev_nginx wget -q -O- http://localhost/ >/dev/null 2>&1; then echo "[OK] nginx"; break; fi; sleep 5; done; docker compose -f docker-compose.yml ps; docker compose -f docker-compose.yml logs --tail=20 backend'

      - name: Create admin user on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'set -e; cd /opt/cuonghoangdev; for i in $(seq 1 30); do if docker exec cuonghoangdev_backend wget -q -O- http://localhost:3001/health 2>/dev/null | grep -q "ok"; then echo "Backend ready"; break; fi; sleep 2; done; if [ -f scripts/seed-admin.js ]; then docker cp scripts/seed-admin.js cuonghoangdev_backend:/app/; docker exec cuonghoangdev_backend node seed-admin.js; echo "Admin setup done"; fi'

      - name: Setup backup cron on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'set -e; mkdir -p /opt/cuonghoangdev/backups; if [ -f /opt/cuonghoangdev/scripts/backup-cron.sh ]; then chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh; chmod +x /opt/cuonghoangdev/scripts/restore-db.sh; fi; (crontab -l 2>/dev/null | grep -v backup-cron; echo "0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1") | crontab -'
