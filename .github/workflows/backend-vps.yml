name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'
      - 'scripts/**'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          mkdir -p ~/.ssh
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n    ConnectTimeout 30\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Verify SSH connection
        run: |
          ssh vps "echo SSH_OK"

      - name: Build Next.js frontend
        run: |
          cd frontend
          npm ci
          NEXT_PUBLIC_BUILD_ID=$(date +%s) npm run build
          echo "--- Built .next/ contents ---"
          ls .next/static/css/*.css 2>/dev/null | head -3
          echo "--- Scrollbar fix present? ---"
          grep -l "chat-messages-scroll" .next/static/css/*.css 2>/dev/null || echo "NOT FOUND"

      - name: Sync project to VPS
        run: |
          rsync -az --delete --no-perms --no-owner --no-group --omit-dir-times \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            --exclude 'setup-swap.sh' \
            --exclude '.env' \
            ./ -e "ssh -F $HOME/.ssh/config" \
            "vps:/opt/cuonghoangdev/" || echo "Rsync completed with warnings (exit $?)"

      - name: Deploy .next/, node_modules, and package files to VPS
        run: |
          echo "--- Streaming build artifacts to VPS ---"
          ssh -F $HOME/.ssh/config vps "rm -rf /opt/cuonghoangdev/frontend/.next /opt/cuonghoangdev/frontend/node_modules && mkdir -p /opt/cuonghoangdev/frontend" || true
          (cd frontend && tar -czf - .next/ node_modules/ package.json package-lock.json) | \
            ssh -F $HOME/.ssh/config vps "cd /opt/cuonghoangdev/frontend && tar -xzf -" || true
          echo "--- Build artifacts deployed ---"
          ssh -F $HOME/.ssh/config vps "ls /opt/cuonghoangdev/frontend/.next/static/css/ 2>/dev/null | head-3" || echo "Verification: file listing skipped"
          ssh -F $HOME/.ssh/config vps "ls /opt/cuonghoangdev/frontend/node_modules/next/package.json 2>/dev/null && echo 'node_modules: OK' || echo 'node_modules: MISSING'" || echo "Verification skipped"

      - name: Create .env on VPS if missing
        run: |
          ssh vps "if [ ! -f /opt/cuonghoangdev/.env ]; then \
              cp /opt/cuonghoangdev/vps-deploy/.env.example /opt/cuonghoangdev/.env; \
              echo '[CREATED] .env from .env.example (no existing .env found)'; \
            else \
              echo '[SKIP] .env already exists, preserving it'; \
            fi"

      - name: Update .env on VPS with secrets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          if grep -q "^YOUTUBE_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
            ssh vps "sed -i 's|^YOUTUBE_API_KEY=.*|YOUTUBE_API_KEY=${YOUTUBE_API_KEY}|' /opt/cuonghoangdev/.env"
          else
            ssh vps "echo 'YOUTUBE_API_KEY=${YOUTUBE_API_KEY}' >> /opt/cuonghoangdev/.env"
          fi
          if grep -q "^OPENROUTER_API_KEY=" /opt/cuonghoangdev/.env 2>/dev/null; then
            ssh vps "sed -i 's|^OPENROUTER_API_KEY=.*|OPENROUTER_API_KEY=${OPENROUTER_API_KEY}|' /opt/cuonghoangdev/.env"
          else
            ssh vps "echo 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}' >> /opt/cuonghoangdev/.env"
          fi
          if [ -n "$POSTGRES_PASSWORD" ]; then
            if grep -q "^POSTGRES_PASSWORD=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}' >> /opt/cuonghoangdev/.env"
            fi
            ssh vps "python3 -c \"import urllib.parse; import re; pw = '''${POSTGRES_PASSWORD}'''; encoded = urllib.parse.quote(pw, safe=''); lines = open('/opt/cuonghoangdev/.env').readlines(); out = []; found = False; [out.append(re.sub(r'^DATABASE_URL=.*', 'DATABASE_URL=postgresql://postgres:' + encoded + '@postgres:5432/cuonghoangdev_db?schema=public', l)) if l.startswith('DATABASE_URL=') else out.append(l) for l in lines]; open('/opt/cuonghoangdev/.env','w').writelines(out); print('DATABASE_URL updated')\""
          else
            ssh vps "docker compose -f /opt/cuonghoangdev/docker-compose.yml exec -T postgres psql -U postgres -c \\\"ALTER USER postgres PASSWORD '123456';\\\" 2>/dev/null || echo '[WARN] Could not reset postgres password'"
            if grep -q "^POSTGRES_PASSWORD=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=123456|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'POSTGRES_PASSWORD=123456' >> /opt/cuonghoangdev/.env"
            fi
            if grep -q "^DATABASE_URL=" /opt/cuonghoangdev/.env 2>/dev/null; then
              ssh vps "sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:123456@postgres:5432/cuonghoangdev_db?schema=public|' /opt/cuonghoangdev/.env"
            else
              ssh vps "echo 'DATABASE_URL=postgresql://postgres:123456@postgres:5432/cuonghoangdev_db?schema=public' >> /opt/cuonghoangdev/.env"
            fi
          fi
          ssh vps "grep -E 'OPENROUTER_API_KEY|YOUTUBE_API_KEY|POSTGRES_PASSWORD' /opt/cuonghoangdev/.env"

      - name: Upload and run swap setup script
        continue-on-error: true
        run: |
          chmod +x setup-swap.sh
          scp -F ~/.ssh/config setup-swap.sh "vps:/tmp/setup-swap.sh" || true
          ssh vps "sudo bash /tmp/setup-swap.sh 2>/dev/null; rm -f /tmp/setup-swap.sh" || true

      - name: Upload deploy script
        run: |
          chmod +x scripts/deploy-vps.sh
          scp -F ~/.ssh/config scripts/deploy-vps.sh "vps:/opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Run deploy script on VPS
        run: |
          ssh vps "bash /opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Sync .next/ into frontend container (fixes out-of-sync container filesystem)
        run: |
          ssh vps "docker exec -u root cuonghoangdev_frontend sh -c 'rm -rf /app/.next/* && mkdir -p /app/.next' && docker cp /opt/cuonghoangdev/frontend/.next/. cuonghoangdev_frontend:/app/.next/ && docker restart cuonghoangdev_frontend"

      - name: Setup cron jobs on VPS
        run: |
          ssh vps "
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts
            chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh 2>/dev/null || true
            chmod +x /opt/cuonghoangdev/scripts/restore-db.sh 2>/dev/null || true
            (crontab -l 2>/dev/null | grep -v backup-cron; \
              echo '0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1') | crontab -
            (crontab -l 2>/dev/null | grep -v monitor.sh; \
              echo '*/5 * * * * /opt/cuonghoangdev/scripts/monitor.sh >> /var/log/cuonghoangdev-monitor.log 2>&1') | crontab -
            echo 'Cron jobs:'
            crontab -l
          "
