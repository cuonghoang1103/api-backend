name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'
      - 'scripts/**'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo SSH_OK"

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ -e "ssh -i ~/.ssh/deploy_key" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Upload deploy script
        run: |
          chmod +x scripts/deploy-vps.sh
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            scripts/deploy-vps.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Run deploy script on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "bash /opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Seed Cuong03dx admin account on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          chmod +x scripts/seed-cuong03dx.cjs
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            scripts/seed-cuong03dx.cjs \
            "$VPS_USER@$VPS_HOST:/opt/cuonghoangdev/scripts/seed-cuong03dx.cjs"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "docker compose exec -T backend node /app/scripts/seed-cuong03dx.cjs"

      - name: Setup cron jobs on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" "
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts
            chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh 2>/dev/null || true
            chmod +x /opt/cuonghoangdev/scripts/restore-db.sh 2>/dev/null || true
            (crontab -l 2>/dev/null | grep -v backup-cron; \
              echo '0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1') | crontab -
            (crontab -l 2>/dev/null | grep -v monitor.sh; \
              echo '*/5 * * * * /opt/cuonghoangdev/scripts/monitor.sh >> /var/log/cuonghoangdev-monitor.log 2>&1') | crontab -
            echo 'Cron jobs:'
            crontab -l
          "
