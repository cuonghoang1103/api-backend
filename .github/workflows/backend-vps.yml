name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - '.github/workflows/backend-vps.yml'
      - 'scripts/**'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo SSH_OK"

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ -e "ssh -i ~/.ssh/deploy_key" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Get DB password locally (from docker-compose.yml)
          DB_PASS=$(grep 'POSTGRES_PASSWORD' docker-compose.yml | grep -v '^#' | head -1 | sed 's/.*POSTGRES_PASSWORD:-\([^}]*\)}.*/\1/')
          DB_PASS="${DB_PASS:-123456}"
          echo "Using DB_PASS: ${DB_PASS}"

          # Upload deploy script
          chmod +x scripts/deploy-vps.sh
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/deploy-vps.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/scripts/deploy-vps.sh"

          # Run deploy script on VPS
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash /opt/cuonghoangdev/scripts/deploy-vps.sh '${DB_PASS}'"

      - name: Create admin user on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -e
            cd /opt/cuonghoangdev
            for i in \$(seq 1 30); do
              if docker exec cuonghoangdev_backend curl -sf http://localhost:3001/health 2>/dev/null | grep -q 'ok'; then
                echo 'Backend ready'
                break
              fi
              sleep 2
            done
            if [ -f scripts/seed-admin.cjs ]; then
              docker cp scripts/seed-admin.cjs cuonghoangdev_backend:/app/seed-admin.cjs
              docker exec cuonghoangdev_backend node seed-admin.cjs
              echo 'Admin setup done'
            fi
          "

      - name: Setup cron jobs on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts
            [ -f /opt/cuonghoangdev/scripts/backup-cron.sh ] && chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh
            [ -f /opt/cuonghoangdev/scripts/restore-db.sh ] && chmod +x /opt/cuonghoangdev/scripts/restore-db.sh
            (crontab -l 2>/dev/null | grep -v backup-cron; echo '0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1') | crontab -
            (crontab -l 2>/dev/null | grep -v monitor.sh; echo '*/5 * * * * /opt/cuonghoangdev/scripts/monitor.sh >> /var/log/cuonghoangdev-monitor.log 2>&1') | crontab -
            echo 'Cron jobs set up:'
            crontab -l
          "
