name: CI - Lint & Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'frontend/src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'frontend/package.json'
      - 'tsconfig.json'
      - 'frontend/tsconfig.json'
      - '.eslintrc.json'
      - '.prettierrc'

jobs:
  backend-lint:
    name: Backend Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: TypeScript type-check (required)
        run: npx tsc --noEmit
      - name: Unit tests — money math + payment signature (required)
        run: npm test
      - name: ESLint (informational)
        continue-on-error: true
        run: npm run lint 2>&1 | tail -30 || echo "(lint warnings — pre-existing)"

  frontend-lint:
    name: Frontend Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: TypeScript type-check (required)
        run: npx tsc --noEmit --skipLibCheck
      - name: Next.js ESLint (informational)
        continue-on-error: true
        run: npx next lint --dir src 2>&1 | tail -30 || echo "(next lint not configured — skipping)"
