name: CI - Lint & Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'frontend/src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'frontend/package.json'
      - 'tsconfig.json'
      - 'frontend/tsconfig.json'
      - '.eslintrc.json'
      - '.prettierrc'

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: TypeScript type-check
        run: npx tsc --noEmit

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Next.js ESLint
        run: npx next lint --dir src 2>&1 || echo "(next lint not configured — skipping)"
      - name: TypeScript type-check
        run: npx tsc --noEmit
