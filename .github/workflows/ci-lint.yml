name: CI - Lint & Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'frontend/src/**'
      - 'eval/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'frontend/package.json'
      - 'tsconfig.json'
      - 'frontend/tsconfig.json'
      - '.eslintrc.json'
      - '.prettierrc'
  workflow_dispatch: {}   # cho phép bấm chạy tay (Actions → Run workflow) — không cần push

jobs:
  backend-lint:
    name: Backend Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22 matches the production runtime (node:22-alpine) and is required
          # by the CV PDF round-trip test in `npm test` (unpdf needs
          # Promise.withResolvers, a Node 22 feature).
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: TypeScript type-check (required)
        run: npx tsc --noEmit
      - name: Interview grader eval — golden set (required)
        # STATIC eval: pure, no DB, no LLM key. Fails the build if the grader
        # stops ranking answers correctly (a prompt/scoring regression). The AI
        # eval (npm run eval:grader:ai) needs a key and is run manually.
        run: npm run eval:grader
      - name: CV linter eval — golden set (required)
        # STATIC eval: pure, no DB, no LLM key. Fails the build if the CV bullet
        # linter regresses — especially if it starts marking STRONG bullets WEAK
        # (the fatal false-positive the harness gates on).
        run: npm run eval:cv-linter
      - name: CV critique fabrication test (skips without an AI key)
        # Feeds the reviewer a metric-less CV and fails if it invents a number.
        # Becomes a REAL gate once the repo secrets below are added (Settings →
        # Secrets → Actions): ANTHROPIC_API_KEY, LLM_BASE_URL, LLM_MODEL_REPORT.
        # Without them the env is empty and the test SKIPS (exit 0).
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_REPORT: ${{ secrets.LLM_MODEL_REPORT }}
        run: npm run eval:cv-fabrication
      - name: Unit tests — money math + payment signature (required)
        run: npm test
      - name: ESLint (informational)
        continue-on-error: true
        run: npm run lint 2>&1 | tail -30 || echo "(lint warnings — pre-existing)"

  frontend-lint:
    name: Frontend Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: TypeScript type-check (required)
        run: npx tsc --noEmit --skipLibCheck
      - name: Next.js ESLint (informational)
        continue-on-error: true
        run: npx next lint --dir src 2>&1 | tail -30 || echo "(next lint not configured — skipping)"
