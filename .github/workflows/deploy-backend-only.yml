name: Deploy Backend Only

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Verify SSH connection
        run: |
          ssh vps "echo SSH_OK"

      - name: Build backend TypeScript on CI (no Docker cache issues)
        run: |
          echo "--- Installing backend deps ---"
          npm ci --include=dev 2>&1 | tail -3
          echo "--- Generating Prisma client ---"
          npx prisma generate 2>&1 | tail -3
          echo "--- Compiling TypeScript ---"
          npx tsc 2>&1
          echo "--- Verify compiled code ---"
          grep -c "router.get.*/projects" dist/routes/admin.routes.js && echo "[OK] admin/projects route compiled!"

      - name: Sync project to VPS
        run: |
          rsync -az --delete --no-perms --no-owner --no-group --omit-dir-times \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            --exclude '.env' \
            ./ -e "ssh -F $HOME/.ssh/config" \
            "vps:/opt/cuonghoangdev/"

      - name: Deploy backend: inject fresh dist into container
        run: |
          echo "--- Copying compiled dist to VPS ---"
          ssh vps "mkdir -p /opt/cuonghoangdev/dist_fresh"
          (tar -czf - dist/) | ssh -F $HOME/.ssh/config vps "cd /opt/cuonghoangdev && tar -xzf -"
          echo "--- Injecting dist into running backend container ---"
          ssh vps "docker cp /opt/cuonghoangdev/dist/. cuonghoangdev_backend:/app/dist/"
          echo "--- Restarting backend to load new code ---"
          ssh vps "docker restart cuonghoangdev_backend"
          echo "--- Waiting for reload ---"
          ssh vps "for i in \$(seq 1 12); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend reloaded!'
              break
            fi
            echo \"Reload... (\$i/12)\"
            sleep 5
          done"
          echo "--- Verify admin/projects route ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -s http://localhost:3001/api/v1/admin/projects 2>&1'"

      - name: Restart nginx
        run: |
          ssh vps "cd /opt/cuonghoangdev && docker compose restart nginx 2>&1"
