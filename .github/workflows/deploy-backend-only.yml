name: Deploy Backend Only

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Verify SSH connection
        run: |
          ssh vps "echo SSH_OK"

      - name: Sync project to VPS (backend only)
        run: |
          rsync -az --delete --no-perms --no-owner --no-group --omit-dir-times \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            --exclude '.env' \
            ./ -e "ssh -F $HOME/.ssh/config" \
            "vps:/opt/cuonghoangdev/"

      - name: Upload and run deploy script
        run: |
          chmod +x scripts/deploy-vps.sh
          scp -F ~/.ssh/config scripts/deploy-vps.sh "vps:/opt/cuonghoangdev/scripts/deploy-vps.sh"
          ssh vps "bash /opt/cuonghoangdev/scripts/deploy-vps.sh"

      - name: Verify admin/projects route works
        run: |
          echo "=== Verify /api/v1/admin/projects ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/api/v1/admin/projects 2>&1 || echo FAILED'"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -c projects /app/dist/routes/admin.routes.js 2>&1 || echo NOT FOUND'"

      - name: Restart nginx
        run: |
          ssh vps "cd /opt/cuonghoangdev && docker compose restart nginx 2>&1"
