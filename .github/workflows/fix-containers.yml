name: Fix Containers

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Fix containers
        run: |
          echo "=== Stop all containers forcefully ==="
          ssh vps "docker stop \$(docker ps -q --filter name=cuonghoangdev) 2>/dev/null || true"
          ssh vps "docker rm -f \$(docker ps -aq --filter name=cuonghoangdev) 2>/dev/null || true"
          ssh vps "docker network prune -f 2>/dev/null || true"
          sleep 3
          
          echo "=== Check for orphaned postgres ==="
          ssh vps "docker ps -a | grep postgres || echo 'No postgres containers'"
          ssh vps "docker container prune -f 2>/dev/null || true"
          sleep 2
          
          echo "=== Start containers ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d 2>&1"
          sleep 30
          
          echo "=== Container status ==="
          ssh vps "docker ps --filter name=cuonghoangdev --format 'table {{.Names}}\t{{.Status}}'"
          
          echo "=== Check services ==="
          ssh vps "curl -sf http://localhost:3000/ >/dev/null && echo 'Frontend: OK' || echo 'Frontend: FAILED'"
          ssh vps "curl -sf http://localhost:3001/ >/dev/null && echo 'Backend: OK' || echo 'Backend: FAILED'"

      - name: Verify site
        run: |
          sleep 10
          ssh vps "curl -sf https://cuongthai.com/ >/dev/null && echo 'Site is UP' || echo 'Site check failed'"
