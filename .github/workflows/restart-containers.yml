name: Restart Containers

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Restart all containers
        run: |
          echo "--- Stopping containers ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose stop backend frontend nginx redis 2>&1 || true"
          sleep 5
          echo "--- Starting containers ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d postgres redis 2>&1"
          sleep 10
          echo "--- Container status ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose ps"
          echo "--- Frontend startup ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d frontend 2>&1"
          sleep 10
          ssh vps "docker exec cuonghoangdev_frontend sh -c 'wget -qO- http://localhost:3000/ >/dev/null 2>&1 && echo FRONTEND_UP || echo FRONTEND_DOWN'"
          echo "--- Nginx startup ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d nginx 2>&1"
          sleep 5

      - name: Verify site
        run: |
          sleep 10
          ssh vps "curl -sf https://cuongthai.com/ >/dev/null && echo 'Site is UP' || echo 'Site check failed'"
