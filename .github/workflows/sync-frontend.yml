name: Sync Frontend to VPS (Quick)

on:
  workflow_dispatch:

jobs:
  sync-frontend:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Restart frontend container (use built-in .next)
        run: |
          ssh vps "docker restart cuonghoangdev_frontend"
          sleep 5
          echo "--- Frontend container status ---"
          ssh vps "docker inspect cuonghoangdev_frontend --format 'Status: {{.State.Status}} | Image: {{.Config.Image}}'"

      - name: Verify site is up
        run: |
          sleep 5
          ssh vps "curl -sf http://frontend:3000/ >/dev/null && echo 'Frontend is UP on internal port' || echo 'Frontend check failed on internal port'"
          ssh vps "curl -sf https://cuongthai.com/ >/dev/null && echo 'Site is UP' || echo 'Site check failed'"
