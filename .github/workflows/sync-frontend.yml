name: Rebuild & Restart Frontend

on:
  workflow_dispatch:

jobs:
  rebuild-frontend:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Rebuild and restart frontend via docker compose
        run: |
          echo "--- Stopping old container ---"
          ssh vps "docker stop cuonghoangdev_frontend 2>/dev/null || true"
          ssh vps "docker rm -f cuonghoangdev_frontend 2>/dev/null || true"
          echo "--- Rebuilding and restarting via docker compose ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d --force-recreate --no-deps frontend 2>&1"
          echo "--- Waiting for frontend to start ---"
          ssh vps "for i in \$(seq 1 20); do if docker exec cuonghoangdev_frontend sh -c 'wget -qO- http://localhost:3000/ >/dev/null 2>&1'; then echo 'Frontend is UP'; break; else echo 'Waiting... (\$i/20)'; fi; sleep 3; done"
          echo "--- Container status ---"
          ssh vps "docker ps --filter name=cuonghoangdev_frontend --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'"

      - name: Verify site is up
        run: |
          sleep 5
          ssh vps "curl -sf https://cuongthai.com/ >/dev/null && echo 'Site is UP' || echo 'Site check failed'"
