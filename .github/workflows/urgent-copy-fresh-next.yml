name: VPS - URGENT: Properly copy fresh .next into container

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Stop container, wipe, and properly copy
        run: |
          ssh vps "
            set -e
            cd /opt/cuonghoangdev

            echo '=== Stop frontend container ==='
            docker stop cuonghoangdev_frontend 2>&1 || true
            docker rm -f cuonghoangdev_frontend 2>&1 || true

            echo ''
            echo '=== Verify host .next has /social route ==='
            grep -o '\"/social\"' frontend/.next/routes-manifest.json | head -1
            cat frontend/.next/BUILD_ID
            echo ''
            echo 'Chunks count on host:'
            ls frontend/.next/static/chunks/ | wc -l
            echo 'Chunks containing MESSAGES_DISABLED:'
            grep -l 'MESSAGES_DISABLED' frontend/.next/static/chunks/*.js | head -3

            echo ''
            echo '=== Start container with compose (it bakes in .next from image, but we override) ==='
            # Start container first
            docker compose up -d --no-deps frontend 2>&1
            sleep 8

            echo ''
            echo '=== Wait for container to be healthy ==='
            for i in \$(seq 1 15); do
              STATUS=\$(docker inspect --format='{{.State.Health.Status}}' cuonghoangdev_frontend 2>/dev/null || echo 'starting')
              if [ \"\$STATUS\" = 'healthy' ]; then
                echo \"Container is healthy after \${i} checks\"
                break
              fi
              echo \"Status: \$STATUS (\$i/15)\"
              sleep 3
            done

            echo ''
            echo '=== Now copy fresh .next from host into container ==='
            docker exec -u root cuonghoangdev_frontend sh -c 'rm -rf /app/.next/*'
            docker cp /opt/cuonghoangdev/frontend/.next/. cuonghoangdev_frontend:/app/.next/

            echo ''
            echo '=== Restart container to pick up new build ==='
            docker restart cuonghoangdev_frontend
            sleep 15

            echo ''
            echo '=== Check container status ==='
            for i in \$(seq 1 20); do
              STATUS=\$(docker inspect --format='{{.State.Health.Status}}' cuonghoangdev_frontend 2>/dev/null || echo 'starting')
              if [ \"\$STATUS\" = 'healthy' ]; then
                echo \"Container healthy after \${i} checks\"
                break
              fi
              echo \"Status: \$STATUS (\$i/15)\"
              sleep 3
            done

            echo ''
            echo '=== Verify on production ==='
            sleep 5
            curl -sI --max-time 10 'https://cuongthai.com/social' | head -3
            echo ''
            echo '=== Verify chunks have new code ==='
            curl -s --max-time 10 'https://cuongthai.com/social' 2>&1 > /tmp/social.html
            for chunk in \$(grep -oE '/_next/static/chunks/[a-f0-9-]+\.js' /tmp/social.html | sort -u); do
              CONTENT=\$(curl -s --max-time 5 \"https://cuongthai.com\$chunk\" 2>&1)
              if echo \"\$CONTENT\" | grep -q 'MESSAGES_DISABLED'; then
                echo \"*** FOUND MESSAGES_DISABLED in: \$chunk\"
              fi
              if echo \"\$CONTENT\" | grep -q 'MessageSquare'; then
                echo \"*** FOUND MessageSquare in: \$chunk\"
              fi
              if echo \"\$CONTENT\" | grep -q 'Đang mở'; then
                echo \"*** FOUND Vietnamese 'Đang mở' in: \$chunk\"
              fi
            done
          "
