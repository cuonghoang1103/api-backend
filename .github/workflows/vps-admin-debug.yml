name: VPS Admin Routes Debug

on:
  workflow_dispatch:

jobs:
  debug-admin-routes:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check compiled admin.routes.js
        run: |
          echo "=== Check if admin/routes has projects route in compiled code ==="
          ssh vps "docker cp cuonghoangdev_backend:/app/dist/routes/admin.routes.js /tmp/admin.routes.js 2>&1 && echo 'COPY OK' && grep -o 'admin/projects\|router.get.*projects' /tmp/admin.routes.js | head -10 || echo 'NOT FOUND'"

      - name: List all compiled routes
        run: |
          echo "=== All compiled routes files ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'ls /app/dist/routes/ 2>&1'"

      - name: Search for admin/projects in compiled code
        run: |
          echo "=== Search admin/projects in all dist files ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -r \"admin/projects\" /app/dist/ 2>&1 | head -5 || echo NOT FOUND'"

      - name: Check build timestamp
        run: |
          echo "=== Build timestamp of admin.routes.js ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'stat /app/dist/routes/admin.routes.js 2>&1 | grep -i modify || stat /app/dist/routes/admin.routes.js 2>&1'"

      - name: Check git hash on VPS
        run: |
          echo "=== Git log on VPS ==="
          ssh vps "cd /opt/cuonghoangdev && git log --oneline -3 2>&1 || echo 'Not a git repo'"

      - name: Compare admin.routes.ts source vs compiled
        run: |
          echo "=== admin.routes.ts contains admin/projects ==="
          ssh vps "grep -c 'admin/projects\|router.*/projects' /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1"
