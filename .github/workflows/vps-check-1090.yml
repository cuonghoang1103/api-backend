name: VPS - Check 1090 chunks specifically

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: List 1090 chunks
        run: |
          ssh vps "
            echo '=== 1090* on host ==='
            ls -la /opt/cuonghoangdev/frontend/.next/static/chunks/1090* 2>&1
            echo ''
            echo '=== 1090* in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -la /app/.next/static/chunks/1090*' 2>&1
            echo ''
            echo '=== Total chunks in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls /app/.next/static/chunks/ | wc -l'
            echo ''
            echo '=== All chunks containing 1090 in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls /app/.next/static/chunks/ | grep 1090'
            echo ''
            echo '=== Check what the failed /login is actually requesting ==='
            echo 'Wait, let me also check for chunks 2518 and webpack that failed:'
            docker exec cuonghoangdev_frontend sh -c 'ls /app/.next/static/chunks/ | grep -E \"2518|webpack|main-app|app/error|app/layout|6376|9653\"' 2>&1
          "
