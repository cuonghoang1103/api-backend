name: VPS Check AI Config

on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check AI env on VPS
        run: |
          echo "=== AI-related env in container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'printenv | grep -E \"GROQ|OPENROUTER|OPENAI|GEMINI|AI_\"'"
          echo ""
          echo "=== AI-related env in .env ==="
          ssh vps "grep -E \"GROQ|OPENROUTER|OPENAI|GEMINI|AI_\" /opt/cuonghoangdev/.env"

      - name: Test Groq API
        run: |
          echo "=== Test Groq API directly ==="
          GROQ_KEY=$(gh secret list 2>&1 > /dev/null && echo "$GROQ_KEY")
          ssh vps "docker exec cuonghoangdev_backend sh -c '
            if [ -n \"\$GROQ_API_KEY\" ]; then
              echo \"GROQ_API_KEY is set (length: \${#GROQ_API_KEY})\"
            else
              echo \"GROQ_API_KEY is EMPTY\"
            fi
            if [ -n \"\$OPENROUTER_API_KEY\" ]; then
              echo \"OPENROUTER_API_KEY is set (length: \${#OPENROUTER_API_KEY})\"
            else
              echo \"OPENROUTER_API_KEY is EMPTY\"
            fi
          '"