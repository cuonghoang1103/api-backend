name: VPS - Check frontend instances

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check instances
        run: |
          ssh vps "
            echo '=== All containers running on port 3000 ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E '3000|frontend'
            echo ''
            echo '=== Find all containers with frontend ==='
            docker ps --filter 'publish=3000' --format 'table {{.Names}}\t{{.Status}}'
            echo ''
            echo '=== Curl to test round-robin ==='
            for i in 1 2 3 4 5 6 7 8; do
              echo -n \"Request \$i: \"
              # check internal 3000 service
              docker exec cuonghoangdev_nginx sh -c 'wget -qO- http://frontend:3000/_next/static/chunks/1090-3bbb31422781b3b6.js 2>&1 | wc -c'
            done
            echo ''
            echo '=== Frontend container processes ==='
            docker exec cuonghoangdev_frontend sh -c 'ps aux | head -20' 2>&1
          "
