name: VPS Check DB Schema
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: List all tables
        run: |
          echo "=== Tables containing 'block' or 'report' or 'message' ==="
          ssh vps "docker exec cuonghoangdev_postgres psql -U postgres -d cuonghoangdev_db -c \"SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;\" 2>&1" | grep -E "block|report|message" -i

      - name: Check schema.prisma mounted in container
        run: |
          echo "=== Check if prisma/schema.prisma is in container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'ls -la prisma/ 2>&1 | head -10'" || echo "No prisma dir"
          echo ""
          echo "=== Schema in container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'cat prisma/schema.prisma 2>/dev/null | head -50'" || echo "Cannot read schema"

      - name: Force push schema with absolute path
        run: |
          echo "=== Run prisma db push with absolute path ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma db push --accept-data-loss --schema=/app/prisma/schema.prisma 2>&1'" | tail -25