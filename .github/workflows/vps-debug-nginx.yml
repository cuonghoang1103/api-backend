name: VPS Debug Nginx

on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check containers
        run: |
          echo "=== Containers ==="
          ssh vps "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"
          echo ""
          echo "=== Test backend directly (from VPS) ==="
          ssh vps "curl -sv -X POST http://localhost:3001/api/v1/ai/chat -H 'Content-Type: application/json' -d '{\"message\": \"Xin chao\"}' 2>&1 | tail -20"
          echo ""
          echo "=== Test through nginx ==="
          ssh vps "curl -sv -X POST http://localhost/api/v1/ai/chat -H 'Content-Type: application/json' -d '{\"message\": \"Xin chao\"}' 2>&1 | tail -20"
          echo ""
          echo "=== Nginx config (api.cuongthai.com) ==="
          ssh vps "docker exec cuonghoangdev_nginx cat /etc/nginx/conf.d/api.conf 2>/dev/null || cat /etc/nginx/conf.d/default.conf 2>/dev/null | head -50"
          echo ""
          echo "=== Nginx error log (last 20) ==="
          ssh vps "docker logs cuonghoangdev_nginx --tail 20 2>&1"