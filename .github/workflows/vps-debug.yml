name: VPS Debug - Check Backend Logs

on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check container status
        run: |
          echo "=== Container Status ==="
          ssh vps "docker ps -a --filter name=cuonghoangdev --format 'table {{.Names}}\t{{.Status}}\t{{.CreatedAt}}'"

      - name: Check backend logs
        run: |
          echo "=== Backend Logs (last 50) ==="
          ssh vps "docker logs cuonghoangdev_backend --tail 50 2>&1" || echo "Cannot get logs"

      - name: Check env vars on VPS
        run: |
          echo "=== .env AI keys ==="
          ssh vps "grep -E 'GROQ_API_KEY|OPENROUTER_API_KEY|GEMINI_API_KEY|AI_CHAT_MODEL' /opt/cuonghoangdev/.env 2>&1" || echo "No match"

      - name: Test health endpoint
        run: |
          echo "=== Health check ==="
          ssh vps "curl -sf http://localhost:3001/health 2>&1 || echo 'Health check failed'"
          ssh vps "curl -sf http://localhost:3001/api/v1/system/health 2>&1 || echo 'System health check failed'"

      - name: Test AI chat
        run: |
          echo "=== Test AI Chat ==="
          curl -s -X POST https://api.cuongthai.com/api/v1/ai/chat \
            -H "Content-Type: application/json" \
            -d '{"message": "Xin chao"}' 2>&1 | head -20
