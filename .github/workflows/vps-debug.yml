name: VPS Debug Commands

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run on VPS'
        required: true
        default: 'docker ps -a'

jobs:
  debug:
    runs-on: ubuntu-24.04
    steps:
      - name: Run debug command
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          DEBUG_CMD: ${{ github.event.inputs.command }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "${VPS_USER}@${VPS_HOST}" \
            "${DEBUG_CMD}"
