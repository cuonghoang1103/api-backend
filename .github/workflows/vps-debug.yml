name: VPS Debug Commands

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check VPS disk space
        run: |
          echo "=== Disk Space ==="
          ssh vps "df -h / /opt /var/lib/docker 2>/dev/null || df -h"

      - name: Check Docker status
        run: |
          echo "=== Docker Info ==="
          ssh vps "docker info 2>&1 | head -20"
          echo "=== Docker Version ==="
          ssh vps "docker version 2>&1"
          echo "=== Docker Compose Version ==="
          ssh vps "docker compose version 2>&1"

      - name: Check Docker disk usage
        run: |
          echo "=== Docker System DF ==="
          ssh vps "docker system df -v 2>&1 | head -30"
          echo "=== Docker Images ==="
          ssh vps "docker images 2>&1"
          echo "=== Docker Containers ==="
          ssh vps "docker ps -a 2>&1"

      - name: Check .env on VPS
        run: |
          echo "=== .env secrets ==="
          ssh vps "grep -E 'OPENROUTER|YOUTUBE|POSTGRES' /opt/cuonghoangdev/.env 2>&1"

      - name: Try Docker build test
        run: |
          echo "=== Test Docker Build ==="
          ssh vps "cd /opt/cuonghoangdev && docker build --no-cache -t test-build:latest -f Dockerfile.backend . 2>&1 | tail -50"

      - name: Check backend container logs
        run: |
          echo "=== Backend Container Status ==="
          ssh vps "docker ps -a | grep backend"
          echo "=== Backend Logs ==="
          ssh vps "docker logs cuonghoangdev_backend --tail 30 2>&1 || echo 'Container not found'"

      - name: Test network connectivity from VPS
        run: |
          echo "=== VPS DNS resolution ==="
          ssh vps "cat /etc/resolv.conf"
          echo "=== Test DNS via dig ==="
          ssh vps "dig api-inference.huggingface.co +short 2>&1 || nslookup api-inference.huggingface.co 2>&1"
          echo "=== Test DNS via curl ==="
          ssh vps "curl -sI --max-time 5 https://api-inference.huggingface.co/v1 2>&1 | head -5"
          echo "=== Test via Google DNS ==="
          ssh vps "curl -s --max-time 5 --dns-ipv4-addr 8.8.8.8 https://api-inference.huggingface.co/v1 2>&1 | head -5"
          echo "=== Test OpenRouter direct ==="
          ssh vps "curl -sI --max-time 5 https://openrouter.ai/api/v1 2>&1 | head -5"
          echo "=== Test Cloudflare ==="
          ssh vps "curl -sI --max-time 5 https://cloudflare.com 2>&1 | head -3"
          echo "=== Test from inside container ==="
          ssh vps "docker exec cuonghoangdev_backend curl -sI --max-time 10 https://api-inference.huggingface.co/v1 2>&1; echo EXIT_CODE=\$?"
          echo "=== Test VPS direct to HF (fallback DNS) ==="
          ssh vps "curl -sI --max-time 10 https://api-inference.huggingface.co/v1 2>&1; echo EXIT_CODE=\$?"
          echo "=== Container DNS ==="
          ssh vps "docker exec cuonghoangdev_backend cat /etc/resolv.conf 2>&1"
          echo "=== VPS /etc/resolv.conf ==="
          ssh vps "cat /etc/resolv.conf"
