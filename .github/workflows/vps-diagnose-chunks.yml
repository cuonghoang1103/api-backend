name: VPS - Diagnose frontend chunks

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Diagnose chunks
        run: |
          ssh vps "
            echo '=== Build manifest in container ==='
            docker exec cuonghoangdev_frontend sh -c 'cat /app/.next/app-build-manifest.json 2>/dev/null | head -100' || true

            echo ''
            echo '=== Path routes manifest in container ==='
            docker exec cuonghoangdev_frontend sh -c 'cat /app/.next/app-path-routes-manifest.json 2>/dev/null' || true

            echo ''
            echo '=== Server manifest for /social ==='
            docker exec cuonghoangdev_frontend sh -c 'cat /app/.next/server/app/social/page.js.nft.json 2>/dev/null' | head -30 || true

            echo ''
            echo '=== Check timestamps ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -la /app/.next/BUILD_ID /app/.next/static/chunks/ 2>/dev/null' | head -10
          "
