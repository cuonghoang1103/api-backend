name: VPS - Direct test of container

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Test on container
        run: |
          ssh vps "
            echo '=== Container route test ==='
            docker exec cuonghoangdev_frontend sh -c 'wget -qO- http://localhost:3000/social 2>/dev/null | head -c 300'
            echo ''
            echo '=== Container /social status code ==='
            docker exec cuonghoangdev_frontend sh -c 'wget -S http://localhost:3000/social -O /dev/null 2>&1 | head -10'
            echo ''
            echo '=== Check via nginx ==='
            curl -sI --max-time 10 'https://cuongthai.com/social' 2>&1 | head -5
            echo ''
            echo '=== Check 404 with Cloudflare cache bypass ==='
            curl -sI --max-time 10 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' 'https://cuongthai.com/social' 2>&1 | head -5
          "
