name: VPS Dump Env

on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Dump all env from .env
        run: |
          echo "=== All keys in /opt/cuonghoangdev/.env ==="
          ssh vps "grep -v '^#' /opt/cuonghoangdev/.env | grep -v '^$' | cut -d= -f1"

      - name: Dump actual env from backend container
        run: |
          echo "=== All env in container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'printenv | grep -v PATH | grep -v HOME | grep -v HOSTNAME | grep -v SHLVL | sort'"

      - name: Check when .env was modified
        run: |
          echo "=== File info ==="
          ssh vps "ls -la /opt/cuonghoangdev/.env && stat /opt/cuonghoangdev/.env"