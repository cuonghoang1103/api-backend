name: VPS - Find missing chunk

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Find 1648
        run: |
          ssh vps "
            echo '=== Check 1648 chunk in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -la /app/.next/static/chunks/1648* 2>&1'
            echo ''
            echo '=== Check 1648 chunk on host ==='
            ls -la /opt/cuonghoangdev/frontend/.next/static/chunks/1648* 2>&1
            echo ''
            echo '=== List all 1648* files in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls /app/.next/static/chunks/ | grep 1648'
            echo ''
            echo '=== List all 1648* files on host ==='
            ls /opt/cuonghoangdev/frontend/.next/static/chunks/ | grep 1648
            echo ''
            echo '=== Test fetch on container (internal) ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -la /app/.next/static/chunks/ | wc -l'
          "
