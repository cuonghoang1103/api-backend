name: VPS Fix Nginx

on: workflow_dispatch

jobs:
  fix:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check nginx status
        run: |
          echo "=== nginx container status ==="
          ssh vps "docker ps -a --filter name=cuonghoangdev_nginx --format 'table {{.Names}}\t{{.Status}}'"
          echo ""
          echo "=== nginx logs (last 30) ==="
          ssh vps "docker logs cuonghoangdev_nginx --tail 30 2>&1"

      - name: Force recreate nginx
        run: |
          echo "=== Stop & remove nginx ==="
          ssh vps "docker stop cuonghoangdev_nginx 2>&1 || true"
          ssh vps "docker rm -f cuonghoangdev_nginx 2>&1 || true"
          sleep 3
          echo "=== Recreate nginx via docker compose ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose -p cuonghoangdev up -d nginx 2>&1"
          sleep 10

      - name: Test
        run: |
          echo "=== Status ==="
          ssh vps "docker ps --filter name=cuonghoangdev_nginx --format 'table {{.Names}}\t{{.Status}}'"
          echo ""
          echo "=== Test frontend ==="
          curl -sI https://cuongthai.com 2>&1 | head -3
          echo ""
          echo "=== Test API ==="
          curl -s https://api.cuongthai.com/api/v1/system/health 2>&1
          echo ""
          echo "=== Test AI chat ==="
          curl -s -X POST https://api.cuongthai.com/api/v1/ai/chat \
            -H "Content-Type: application/json" \
            -d '{"message": "Xin chao"}' 2>&1 | head -20