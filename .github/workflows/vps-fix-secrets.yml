name: VPS Fix Secrets - Add Missing SIGNED_URL_SECRET

on: workflow_dispatch

jobs:
  fix:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check existing secrets
        run: |
          echo "=== Current required secrets ==="
          ssh vps "grep -E '^(JWT_SECRET|JWT_REFRESH_SECRET|SIGNED_URL_SECRET|COOKIE_SECRET|GROQ_API_KEY|OPENROUTER_API_KEY)=' /opt/cuonghoangdev/.env" || echo "No match"

      - name: Generate missing secrets
        run: |
          echo "=== Adding missing required secrets ==="
          # Generate SIGNED_URL_SECRET if missing
          ssh vps "
            if ! grep -q '^SIGNED_URL_SECRET=' /opt/cuonghoangdev/.env; then
              SIGNED_URL_RAND=\$(openssl rand -hex 32)
              echo \"SIGNED_URL_SECRET=\${SIGNED_URL_RAND}\" >> /opt/cuonghoangdev/.env
              echo '[GENERATED] SIGNED_URL_SECRET'
            else
              echo '[OK] SIGNED_URL_SECRET already set'
            fi

            if ! grep -q '^COOKIE_SECRET=' /opt/cuonghoangdev/.env; then
              COOKIE_RAND=\$(openssl rand -hex 32)
              echo \"COOKIE_SECRET=\${COOKIE_RAND}\" >> /opt/cuonghoangdev/.env
              echo '[GENERATED] COOKIE_SECRET'
            else
              echo '[OK] COOKIE_SECRET already set'
            fi
          "

      - name: Restart backend container
        run: |
          echo "=== Restarting backend container ==="
          ssh vps "docker compose -p cuonghoangdev restart backend 2>&1 || docker restart cuonghoangdev_backend 2>&1"
          sleep 10

      - name: Check backend status
        run: |
          echo "=== Container status ==="
          ssh vps "docker ps --filter name=cuonghoangdev --format 'table {{.Names}}\t{{.Status}}'"
          echo "=== Backend logs (last 20) ==="
          ssh vps "docker logs cuonghoangdev_backend --tail 20 2>&1"

      - name: Health check
        run: |
          echo "=== Health check ==="
          ssh vps "curl -sf http://localhost:3001/health 2>&1 || echo 'Health failed'"
          ssh vps "curl -sf http://localhost:3001/api/v1/system/health 2>&1 || echo 'System health failed'"

      - name: Test AI Chat
        run: |
          sleep 5
          echo "=== Test AI Chat ==="
          curl -s -X POST https://api.cuongthai.com/api/v1/ai/chat \
            -H "Content-Type: application/json" \
            -d '{"message": "Xin chao"}' 2>&1 | head -30
