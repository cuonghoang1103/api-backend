name: VPS Fix Uploads Permissions

on: workflow_dispatch

jobs:
  fix-perms:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Show current permissions
        run: |
          echo "=== Current state of /opt/cuonghoangdev/uploads ==="
          ssh vps "ls -la /opt/cuonghoangdev/uploads/ 2>&1 | head -20"
          echo ""
          echo "=== Sample subdir permissions ==="
          ssh vps "stat -c '%n %a %U:%G' /opt/cuonghoangdev/uploads/*/ 2>&1 | head -10"

      - name: Fix permissions on host
        run: |
          echo "=== Running chmod -R 777 on /opt/cuonghoangdev/uploads ==="
          ssh vps "chmod -R 777 /opt/cuonghoangdev/uploads 2>&1 || echo 'chmod failed'"

      - name: Verify new permissions
        run: |
          echo "=== New state ==="
          ssh vps "stat -c '%n %a %U:%G' /opt/cuonghoangdev/uploads /opt/cuonghoangdev/uploads/*/ 2>&1 | head -20"

      - name: Test write from inside backend container
        run: |
          echo "=== Testing write from container (uid 1001) ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'id && touch /app/uploads/playlist-covers/test-write-$(date +%s).txt && echo WRITE_OK || echo WRITE_FAILED'"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'ls -la /app/uploads/playlist-covers/ | head -5'"

      - name: Cleanup test files
        run: |
          ssh vps "docker exec cuonghoangdev_backend sh -c 'rm -f /app/uploads/playlist-covers/test-write-*.txt' || true"
