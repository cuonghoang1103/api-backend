name: VPS - Force pull new frontend image and recreate

on:
  workflow_dispatch:

jobs:
  force-deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Show what image is currently running + what the latest GHCR image is
        run: |
          ssh vps "
            echo '=== Currently running frontend image ==='
            docker inspect cuonghoangdev_frontend --format '{{.Config.Image}}' 2>&1 || true
            echo '=== Frontend .next chunk hashes on disk ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -1 .next/static/chunks/ 2>/dev/null | grep \"^3283-\" | head -5' || true
            echo '=== Frontend container label ==='
            docker ps --filter name=cuonghoangdev_frontend --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            echo '=== Available local images ==='
            docker images | grep -E 'cuonghoang1103/api-backend-frontend' | head
          "

      - name: Pull latest frontend image and force recreate
        run: |
          ssh vps "
            set -e
            cd /opt/cuonghoangdev

            echo '=== Pull latest frontend image ==='
            docker compose pull frontend 2>&1 | tail -10

            echo '=== Stop + remove + recreate frontend container ==='
            docker compose stop frontend 2>&1 || true
            docker compose rm -f frontend 2>&1 || true
            docker rm -f cuonghoangdev_frontend 2>&1 || true
            docker compose up -d --no-deps frontend 2>&1

            echo '=== Wait for frontend healthcheck ==='
            for i in \$(seq 1 20); do
              if docker exec cuonghoangdev_frontend sh -c 'wget -qO- http://localhost:3000/ >/dev/null 2>&1'; then
                echo \"Frontend is UP after \${i} checks\"
                break
              else
                echo \"Waiting... (\$i/20)\"
                sleep 3
              fi
            done

            echo '=== New .next chunk hashes ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -1 .next/static/chunks/ 2>/dev/null | grep \"^3283-\" | head -5' || true
            docker ps --filter name=cuonghoangdev_frontend --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          "

      - name: Restart nginx
        run: |
          ssh vps "cd /opt/cuonghoangdev && docker compose restart nginx 2>&1"
          sleep 5

      - name: Verify production
        run: |
          sleep 10
          echo "=== Site status ==="
          curl -sI --max-time 10 "https://cuongthai.com/" 2>&1 | head -3
          echo ""
          echo "=== Get 3283 chunk on production ==="
          curl -s --max-time 10 "https://cuongthai.com/explore" 2>&1 > /tmp/prod_explore.html
          CHUNK=$(grep -oE "/_next/static/chunks/3283-[a-f0-9]+\.js" /tmp/prod_explore.html | head -1)
          echo "Chunk: $CHUNK"
          if [ -n "$CHUNK" ]; then
            curl -s --max-time 10 "https://cuongthai.com$CHUNK" > /tmp/prod_chunk.js
            echo "Size: $(wc -c < /tmp/prod_chunk.js)"
            echo "MESSAGES_DISABLED count: $(grep -o "MESSAGES_DISABLED" /tmp/prod_chunk.js | wc -l)"
            echo "MessageSquare count: $(grep -o "MessageSquare" /tmp/prod_chunk.js | wc -l)"
            echo "Đang mở count: $(grep -oE "Đang mở" /tmp/prod_chunk.js | wc -l)"
          fi
