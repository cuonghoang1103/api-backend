name: VPS Force Sync Prisma

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n    ConnectTimeout 30\n' "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Force sync prisma folder + regenerate + push
        run: |
          echo "--- 1. Sync fresh prisma/ into container ---"
          ssh vps "docker cp /opt/cuonghoangdev/prisma/. cuonghoangdev_backend:/app/prisma/"
          echo ""
          echo "--- 2. Verify schema inside container has new models ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -E \"model UserBlock|model ThreadReport|preferences\" /app/prisma/schema.prisma | head -10'"
          echo ""
          echo "--- 3. Regenerate Prisma Client ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma generate 2>&1' | tail -10"
          echo ""
          echo "--- 4. Push schema to DB ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma db push --accept-data-loss 2>&1' | tail -15"
          echo ""
          echo "--- 5. Verify tables exist ---"
          ssh vps "docker exec cuonghoangdev_postgres psql -U postgres -d cuonghoangdev_db -c '\\dt user_blocks' 2>&1"
          ssh vps "docker exec cuonghoangdev_postgres psql -U postgres -d cuonghoangdev_db -c '\\dt thread_reports' 2>&1"
          echo ""
          echo "--- 6. Restart backend ---"
          ssh vps "docker restart cuonghoangdev_backend"
          echo ""
          echo "--- 7. Wait for healthy ---"
          ssh vps "for i in \$(seq 1 12); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend healthy!';
              break;
            fi;
            echo \"Reload... (\$i/12)\";
            sleep 5;
          done"
          echo ""
          echo "--- 8. Test new endpoint ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -s http://localhost:3001/api/v1/messages/blocks 2>&1 | head -c 200'"
          echo ""
          echo "--- 9. Verify schema.prisma has new models ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -c \"model UserBlock\\|model ThreadReport\" /app/prisma/schema.prisma'"