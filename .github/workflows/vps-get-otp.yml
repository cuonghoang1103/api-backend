name: VPS - Get OTP for testing

on:
  workflow_dispatch:

jobs:
  get-otp:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Find OTP in Redis
        run: |
          ssh vps "
            docker exec cuonghoangdev_redis redis-cli KEYS 'otp:*' | head -10
            echo '---'
            for key in \$(docker exec cuonghoangdev_redis redis-cli KEYS 'otp:*' | head -20); do
              echo \"\$key = \$(docker exec cuonghoangdev_redis redis-cli GET \"\$key\")\"
            done
          "
