name: VPS Inspect Projects Routes

on:
  workflow_dispatch:

jobs:
  inspect-projects:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check what routes are in compiled admin.routes.js
        run: |
          echo "=== All router.get in admin.routes.js ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -o \"router\.\(get\|post\|put\|patch\|delete\)'"'"'[^'"'"']*'"'"' /app/dist/routes/admin.routes.js | head -30'"

      - name: Check if normalizeProject is in compiled code
        run: |
          echo "=== normalizeProject in admin.routes.js ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -c normalizeProject /app/dist/routes/admin.routes.js 2>&1'"

      - name: Count lines in compiled admin.routes.js
        run: |
          echo "=== Line count ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'wc -l /app/dist/routes/admin.routes.js 2>&1'"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'ls -la /app/dist/routes/admin.routes.js 2>&1'"

      - name: Check build timestamps
        run: |
          echo "=== Timestamps ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'stat /app/dist/routes/admin.routes.js | grep -i modify'"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'date'"

      - name: Check git source on VPS
        run: |
          echo "=== admin/routes.ts line count ==="
          ssh vps "wc -l /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1 || echo file not found"
          ssh vps "grep -c '/projects' /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1"
