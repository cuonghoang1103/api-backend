name: VPS - Run R2 URL Migration (manual)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Force-recreate backend so it reads new .env
        run: |
          echo "=== Stopping and removing old backend container ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose stop backend 2>&1 || true"
          ssh vps "cd /opt/cuonghoangdev && docker compose rm -f backend 2>&1 || true"
          echo "=== Recreating backend container ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d --no-deps backend 2>&1"
          sleep 20
          echo "=== Container status ==="
          ssh vps "docker ps --filter name=cuonghoangdev --format 'table {{.Names}}\t{{.Status}}'"
          echo "=== New R2 env in container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'env | grep -E \"R2_PUBLIC_URL|NEXT_PUBLIC_R2_PUBLIC_URL\"'"

      - name: Run migration
        env:
          OLD_HOST: 'pub-8589c8a5e60e429bafe86c0d92e09e90.r2.dev'
          NEW_HOST: 'media.cuongthai.com'
        run: |
          ssh vps "
            set -e
            cd /opt/cuonghoangdev
            docker cp /opt/cuonghoangdev/scripts/migrate-r2-urls.ts \
              cuonghoangdev_backend:/tmp/migrate-r2-urls.ts
            docker exec \
              -e OLD_HOST='${{ env.OLD_HOST }}' \
              -e NEW_HOST='${{ env.NEW_HOST }}' \
              -e DRY_RUN=0 \
              cuonghoangdev_backend sh -c '
                cd /app
                if [ ! -f node_modules/.bin/tsx ]; then
                  npm install --no-save tsx 2>&1 | tail -3
                fi
                OLD_HOST=\"\$OLD_HOST\" NEW_HOST=\"\$NEW_HOST\" DRY_RUN=\"\$DRY_RUN\" \
                  npx tsx /tmp/migrate-r2-urls.ts
              '
          "

      - name: Rebuild frontend with new NEXT_PUBLIC_R2_PUBLIC_URL
        run: |
          echo "=== Rebuilding frontend ==="
          ssh vps "
            docker exec \
              -e NEXT_PUBLIC_R2_PUBLIC_URL=https://media.cuongthai.com \
              -e NEXT_PUBLIC_BUILD_ID=\$(date +%s) \
              cuonghoangdev_frontend sh -c 'cd /app && npm run build 2>&1 | tail -10'
            docker restart cuonghoangdev_frontend
          "
          sleep 15

      - name: Final verification — sample API response
        run: |
          sleep 10
          echo "=== Music tracks ==="
          curl -s --max-time 10 'https://cuongthai.com/api/v1/music/tracks?size=1' | head -c 500
          echo ''
          echo '---'
          echo "=== Social posts ==="
          curl -s --max-time 10 'https://cuongthai.com/api/v1/social/posts?limit=1' | head -c 800
          echo ''
          echo '---'
          echo "=== Playlists ==="
          curl -s --max-time 10 'https://cuongthai.com/api/v1/music/playlists' | head -c 500
          echo ''
