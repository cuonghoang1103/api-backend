name: VPS Run Prisma DB Push

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n    ConnectTimeout 30\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Run prisma db push on VPS
        run: |
          echo "--- Verifying column doesn't exist yet ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose -p cuonghoangdev exec -T postgres psql -U postgres -d cuonghoangdev_db -c \"SELECT column_name FROM information_schema.columns WHERE table_name='message_threads' AND column_name='preferences';\" 2>&1" || true
          echo ""
          echo "--- Running prisma db push ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose -p cuonghoangdev exec -T backend npx prisma db push --accept-data-loss --skip-generate 2>&1" | tail -30
          echo ""
          echo "--- Verifying column was added ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose -p cuonghoangdev exec -T postgres psql -U postgres -d cuonghoangdev_db -c \"SELECT column_name, data_type, column_default FROM information_schema.columns WHERE table_name='message_threads' AND column_name='preferences';\" 2>&1"
          echo ""
          echo "--- Restart backend to pick up new code ---"
          ssh vps "cd /opt/cuonghoangdev && docker compose -p cuonghoangdev restart backend" 2>&1
          echo ""
          echo "--- Waiting for backend health ---"
          ssh vps "for i in \$(seq 1 12); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend healthy!';
              break;
            fi;
            echo \"Reload... (\$i/12)\";
            sleep 5;
          done" 2>&1
          echo ""
          echo "--- Test new endpoint ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -s http://localhost:3001/api/v1/messages/threads 2>&1 | head -c 200'" 2>&1
