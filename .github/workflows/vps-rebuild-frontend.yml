name: VPS - Force deploy frontend + verify new code

on:
  workflow_dispatch:

jobs:
  force-rebuild:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Verify source on VPS has the fix
        run: |
          ssh vps "
            echo '=== Source on VPS ==='
            grep -c 'MESSAGES_DISABLED' /opt/cuonghoangdev/frontend/src/components/social/SocialRightWidget.tsx
            grep -c 'handleMessage' /opt/cuonghoangdev/frontend/src/components/social/SocialRightWidget.tsx
            echo ''
            echo '=== Current chunks on disk (in /opt/cuonghoangdev/frontend/.next/static/chunks) ==='
            ls -la /opt/cuonghoangdev/frontend/.next/static/chunks/ 2>/dev/null | head -5
            echo ''
            echo '=== Current chunks in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls -la /app/.next/static/chunks/ 2>/dev/null' | head -10
            echo ''
            echo '=== Check if chunks have new code in container ==='
            docker exec cuonghoangdev_frontend sh -c 'grep -lE \"MESSAGES_DISABLED|MessageSquare\" /app/.next/static/chunks/*.js 2>/dev/null'
          "

      - name: Force rebuild frontend from current source on VPS
        run: |
          ssh vps "
            set -e
            cd /opt/cuonghoangdev/frontend

            echo '=== Verify source has the fix ==='
            grep -c 'MESSAGES_DISABLED' src/components/social/SocialRightWidget.tsx
            grep -c 'handleMessage' src/components/social/SocialRightWidget.tsx

            echo ''
            echo '=== Run Next.js build in the FRONTEND container (not on host) ==='
            docker exec -u root cuonghoangdev_frontend sh -c '
              set -e
              cd /app
              echo \"--- Current chunks before build ---\"
              ls -la .next/static/chunks/ 2>/dev/null | head -5
              echo \"--- Rebuilding Next.js ---\"
              rm -rf .next
              NEXT_PUBLIC_BUILD_ID=\$(date +%s) npm run build 2>&1 | tail -20
            '

            echo ''
            echo '=== Restart frontend container ==='
            docker restart cuonghoangdev_frontend
            sleep 10
          "

      - name: Verify on production
        run: |
          sleep 15
          echo "=== Hit /social and look for new chunks ==="
          curl -s --max-time 10 "https://cuongthai.com/social" 2>&1 > /tmp/social_new.html
          # Get the chunk list
          ALL_CHUNKS=$(grep -oE '/_next/static/chunks/[a-f0-9-]+\.js' /tmp/social_new.html | sort -u)

          echo "Total chunks: $(echo "$ALL_CHUNKS" | wc -l)"

          for chunk in $ALL_CHUNKS; do
            CONTENT=$(curl -s --max-time 5 "https://cuongthai.com$chunk" 2>&1)
            if echo "$CONTENT" | grep -q "MESSAGES_DISABLED"; then
              echo "*** FOUND MESSAGES_DISABLED in: $chunk"
            fi
            if echo "$CONTENT" | grep -q "MessageSquare"; then
              echo "*** FOUND MessageSquare in: $chunk"
            fi
            if echo "$CONTENT" | grep -qE "Đang mở|kết nối"; then
              echo "*** FOUND Vietnamese strings in: $chunk"
            fi
          done
