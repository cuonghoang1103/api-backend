name: VPS Rebuild Backend

on:
  workflow_dispatch:

jobs:
  rebuild-backend:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Rebuild backend with --no-cache
        run: |
          echo "=== Rebuilding backend without cache ==="
          ssh vps "cd /opt/cuonghoangdev && \
            docker stop cuonghoangdev_backend 2>/dev/null || true && \
            docker rm -f cuonghoangdev_backend 2>/dev/null || true && \
            docker rmi cuonghoangdev_backend:latest 2>/dev/null || true && \
            docker build --no-cache -t cuonghoangdev_backend:latest -f Dockerfile.backend . 2>&1 | tail -10"
