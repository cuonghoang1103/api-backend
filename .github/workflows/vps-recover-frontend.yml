name: VPS - Check container status and recover

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check status
        run: |
          ssh vps "
            echo '=== All containers ==='
            docker ps -a --format 'table {{.Names}}\t{{.ID}}\t{{.Status}}\t{{.Image}}'
            echo ''
            echo '=== Frontend container status ==='
            docker inspect cuonghoangdev_frontend --format 'Status={{.State.Status}}, ExitCode={{.State.ExitCode}}, Error={{.State.Error}}' 2>&1 || true
            echo ''
            echo '=== Recent frontend logs ==='
            docker logs --tail 50 cuonghoangdev_frontend 2>&1
            echo ''
            echo '=== Try restarting the container ==='
            docker restart cuonghoangdev_frontend 2>&1
            sleep 5
            echo ''
            echo '=== Status after restart ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            echo ''
            echo '=== Check if /social is back ==='
            sleep 5
            curl -sI --max-time 5 'https://cuongthai.com/social' 2>&1 | head -3
          "
