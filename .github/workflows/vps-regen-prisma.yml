name: VPS Regenerate Prisma Client

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n    ServerAliveInterval 60\n    ServerAliveCountMax 10\n    ConnectTimeout 30\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Regenerate Prisma Client inside container
        run: |
          echo "--- Regenerate Prisma Client (picks up new models) ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma generate' 2>&1" | tail -10
          echo ""
          echo "--- Push schema to DB (creates new tables) ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'npx prisma db push --accept-data-loss --skip-generate' 2>&1" | tail -20
          echo ""
          echo "--- Restart backend so it picks up the new client ---"
          ssh vps "docker restart cuonghoangdev_backend" 2>&1
          echo ""
          echo "--- Wait for healthy ---"
          ssh vps "for i in \$(seq 1 12); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend healthy!';
              break;
            fi;
            echo \"Reload... (\$i/12)\";
            sleep 5;
          done"
          echo ""
          echo "--- Verify new tables exist ---"
          ssh vps "docker exec cuonghoangdev_postgres psql -U postgres -d cuonghoangdev_db -c '\\dt user_blocks' 2>&1"
          ssh vps "docker exec cuonghoangdev_postgres psql -U postgres -d cuonghoangdev_db -c '\\dt thread_reports' 2>&1"
          echo ""
          echo "--- Test new endpoint ---"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -s http://localhost:3001/api/v1/messages/blocks -H \"Cookie: dummy=value\" 2>&1 | head -c 200'"