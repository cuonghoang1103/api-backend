name: VPS - Purge Cloudflare cache and check

on:
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Restart nginx and test
        run: |
          ssh vps "
            echo '=== Restart nginx ==='
            docker restart cuonghoangdev_nginx
            sleep 5

            echo ''
            echo '=== Check nginx logs for /social requests ==='
            docker logs --tail 30 cuonghoangdev_nginx 2>&1 | tail -10

            echo ''
            echo '=== Test /social ==='
            curl -sI --max-time 10 'https://cuongthai.com/social' 2>&1 | head -3

            echo ''
            echo '=== Test with bypass Host header (just to see what happens) ==='
            curl -sI --max-time 10 -H 'Host: localhost' 'http://cuonghoangdev_nginx/social' 2>&1 | head -3
          "
