name: VPS Rsync Debug

on:
  workflow_dispatch:

jobs:
  rsync-debug:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check source on VPS before rsync
        run: |
          echo "=== VPS admin.routes.ts line count BEFORE rsync ==="
          ssh vps "wc -l /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1 || echo file not found"
          ssh vps "grep -c '/projects' /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1 || echo grep failed"

      - name: Rsync and show output
        run: |
          echo "=== Local admin.routes.ts line count ==="
          wc -l src/routes/admin.routes.ts
          echo "=== Rsyncing with verbose output ==="
          rsync -avz --delete --no-perms --no-owner --no-group --omit-dir-times \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            --exclude '.env' \
            ./ -e "ssh -F $HOME/.ssh/config" \
            "vps:/opt/cuonghoangdev/" 2>&1 | tail -20

      - name: Check source on VPS after rsync
        run: |
          echo "=== VPS admin.routes.ts line count AFTER rsync ==="
          ssh vps "wc -l /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1 || echo file not found"
          ssh vps "grep -c '/projects' /opt/cuonghoangdev/src/routes/admin.routes.ts 2>&1 || echo grep failed"

      - name: Force rebuild on VPS
        run: |
          echo "=== Force clean rebuild ==="
          ssh vps "cd /opt/cuonghoangdev && \
            docker stop cuonghoangdev_backend 2>/dev/null || true && \
            docker rm -f cuonghoangdev_backend 2>/dev/null || true && \
            docker rmi cuonghoangdev_backend:latest 2>/dev/null || true && \
            docker build -t cuonghoangdev_backend:latest -f Dockerfile.backend . 2>&1 | tail -20"

      - name: Start and verify
        run: |
          echo "=== Start backend ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d backend 2>&1"
          echo "=== Waiting for health ==="
          ssh vps "for i in \$(seq 1 30); do
            if docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/health >/dev/null 2>&1'; then
              echo '[OK] Backend healthy!'
              break
            fi
            echo \"Wait \$i/30\"
            sleep 5
          done"
          echo "=== Verify ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'curl -sf http://localhost:3001/api/v1/admin/projects 2>&1 || echo FAILED'"
          ssh vps "docker exec cuonghoangdev_backend sh -c 'grep -c projects /app/dist/routes/admin.routes.js 2>&1 || echo NOT FOUND'"
