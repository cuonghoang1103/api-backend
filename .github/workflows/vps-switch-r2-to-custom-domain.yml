name: VPS - Switch R2 URLs to Custom Domain

on:
  workflow_dispatch:

jobs:
  switch-r2-url:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Show current R2 env vars
        run: |
          echo "=== Before ==="
          ssh vps "grep -E '^(R2_PUBLIC_URL|NEXT_PUBLIC_R2_PUBLIC_URL)=' /opt/cuonghoangdev/.env || echo 'no match'"

      - name: Rewrite R2_PUBLIC_URL in .env
        run: |
          ssh vps "
            set -e
            ENV=/opt/cuonghoangdev/.env

            # Replace R2_PUBLIC_URL (server-side, used by backend on upload)
            if grep -q '^R2_PUBLIC_URL=' \"\$ENV\"; then
              sed -i 's|^R2_PUBLIC_URL=.*|R2_PUBLIC_URL=https://media.cuongthai.com|' \"\$ENV\"
              echo '[OK] R2_PUBLIC_URL updated'
            else
              echo 'R2_PUBLIC_URL=https://media.cuongthai.com' >> \"\$ENV\"
              echo '[ADDED] R2_PUBLIC_URL'
            fi

            # Replace NEXT_PUBLIC_R2_PUBLIC_URL (build-time env, used by frontend)
            if grep -q '^NEXT_PUBLIC_R2_PUBLIC_URL=' \"\$ENV\"; then
              sed -i 's|^NEXT_PUBLIC_R2_PUBLIC_URL=.*|NEXT_PUBLIC_R2_PUBLIC_URL=https://media.cuongthai.com|' \"\$ENV\"
              echo '[OK] NEXT_PUBLIC_R2_PUBLIC_URL updated'
            else
              echo 'NEXT_PUBLIC_R2_PUBLIC_URL=https://media.cuongthai.com' >> \"\$ENV\"
              echo '[ADDED] NEXT_PUBLIC_R2_PUBLIC_URL'
            fi
          "

      - name: Verify rewrite
        run: |
          echo "=== After ==="
          ssh vps "grep -E '^(R2_PUBLIC_URL|NEXT_PUBLIC_R2_PUBLIC_URL)=' /opt/cuonghoangdev/.env"

      - name: Restart backend to pick up new env
        run: |
          echo "=== Force-recreating backend so it reads new .env ==="
          ssh vps "cd /opt/cuonghoangdev && docker compose up -d --force-recreate --no-deps backend 2>&1"
          sleep 12
          echo "=== Container status ==="
          ssh vps "docker ps --filter name=cuonghoangdev --format 'table {{.Names}}\t{{.Status}}'"

      - name: Confirm new env loaded in container
        run: |
          echo "=== New env inside backend container ==="
          ssh vps "docker exec cuonghoangdev_backend sh -c 'env | grep -E \"R2_PUBLIC_URL|NEXT_PUBLIC_R2_PUBLIC_URL\"'"

      - name: Smoke-test new URL format from API
        run: |
          echo "=== New uploads should now return media.cuongthai.com ==="
          # We can't trigger an upload from CI without auth, so we just
          # assert that the env var changed. The migration script in
          # the next step rewrites existing rows.
          curl -sf http://localhost:3001/api/v1/system/health 2>&1 || \
            echo 'Health endpoint check (non-fatal)'

      - name: Run DB migration script (rewrite existing URLs)
        env:
          OLD_HOST: 'pub-8589c8a5e60e429bafe86c0d92e09e90.r2.dev'
          NEW_HOST: 'media.cuongthai.com'
        run: |
          ssh vps "
            set -e
            cd /opt/cuonghoangdev

            # Copy the script into the container so we don't need
            # host bind mounts (the workflow runs docker exec, which
            # doesn't accept -v here without root). After this the
            # script is available at /tmp/migrate-r2-urls.ts inside
            # the container.
            docker cp /opt/cuonghoangdev/scripts/migrate-r2-urls.ts \
              cuonghoangdev_backend:/tmp/migrate-r2-urls.ts

            docker exec \
              -e OLD_HOST='${{ env.OLD_HOST }}' \
              -e NEW_HOST='${{ env.NEW_HOST }}' \
              -e DRY_RUN=0 \
              cuonghoangdev_backend sh -c '
                cd /app
                if [ ! -f node_modules/.bin/tsx ]; then
                  echo \"[WARN] tsx not found, installing...\"
                  npm install --no-save tsx 2>&1 | tail -3
                fi
                OLD_HOST=\"\$OLD_HOST\" \
                NEW_HOST=\"\$NEW_HOST\" \
                DRY_RUN=\"\$DRY_RUN\" \
                  npx tsx /tmp/migrate-r2-urls.ts
              '
          "

      - name: Rebuild frontend with new NEXT_PUBLIC_R2_PUBLIC_URL
        run: |
          echo "=== Rebuilding frontend so NEXT_PUBLIC_R2_PUBLIC_URL is baked in ==="
          ssh vps "
            set -e
            cd /opt/cuonghoangdev/frontend

            # Re-export the env so the Next.js build reads it
            export NEXT_PUBLIC_R2_PUBLIC_URL=https://media.cuongthai.com
            export NEXT_PUBLIC_BUILD_ID=\$(date +%s)

            # Build inside the frontend container so node_modules matches
            docker exec -e NEXT_PUBLIC_R2_PUBLIC_URL -e NEXT_PUBLIC_BUILD_ID \
              cuonghoangdev_frontend sh -c 'cd /app && npm run build 2>&1 | tail -20'

            # Restart frontend so it picks up the new .next
            docker restart cuonghoangdev_frontend
          "
          sleep 15

      - name: Final verification
        run: |
          echo "=== Sample API response — URLs should now point at media.cuongthai.com ==="
          sleep 10
          curl -s --max-time 10 'https://cuongthai.com/api/v1/music/tracks?page=1&size=2' \
            | head -c 1000
          echo ''
          echo '---'
          curl -s --max-time 10 'https://cuongthai.com/api/v1/social/posts?limit=1' \
            | head -c 1000
          echo ''
