name: VPS - Test from container

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Test chunks
        run: |
          ssh vps "
            echo '=== Direct curl on container (port 3000) ==='
            docker exec cuonghoangdev_frontend sh -c 'wget -S -O - http://localhost:3000/_next/static/chunks/1090-3bbb31422781b3b6.js 2>&1 | head -10'
            echo ''
            echo '=== With Cache-Control no-cache header ==='
            docker exec cuonghoangdev_frontend sh -c 'wget -S -O - --header=\"Cache-Control: no-cache\" http://localhost:3000/_next/static/chunks/1090-3bbb31422781b3b6.js 2>&1 | head -10'
            echo ''
            echo '=== Check next.js static handler logs ==='
            docker logs --tail 50 cuonghoangdev_frontend 2>&1 | tail -20
          "
