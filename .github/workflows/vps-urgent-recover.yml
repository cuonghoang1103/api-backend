name: VPS - URGENT: Recover frontend container

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Stop the broken container and check what .next exists on host
        run: |
          ssh vps "
            echo '=== Stop the broken container ==='
            docker stop cuonghoangdev_frontend 2>&1 || true
            docker rm -f cuonghoangdev_frontend 2>&1 || true

            echo ''
            echo '=== Check if .next exists on host ==='
            ls -la /opt/cuonghoangdev/frontend/.next/ 2>/dev/null | head -5
            ls -la /opt/cuonghoangdev/frontend/.next/BUILD_ID 2>/dev/null || echo 'No BUILD_ID'
            ls /opt/cuonghoangdev/frontend/.next/static/chunks/ 2>/dev/null | wc -l
            echo ''
            echo '=== If .next is empty, rebuild on the fly ==='
            if [ ! -f /opt/cuonghoangdev/frontend/.next/BUILD_ID ]; then
              echo 'Building Next.js on VPS...'
              cd /opt/cuonghoangdev/frontend
              ls package.json node_modules/ 2>&1 | head -3
              echo 'Source files check:'
              grep -c 'MESSAGES_DISABLED' src/components/social/SocialRightWidget.tsx || echo 'No source'
              grep -c 'handleMessage' src/components/social/SocialRightWidget.tsx || echo 'No source'
              echo 'Running build...'
              NEXT_PUBLIC_BUILD_ID=\$(date +%s) npm run build 2>&1 | tail -20
              echo 'Build done. Files:'
              ls -la /opt/cuonghoangdev/frontend/.next/ | head -10
              ls /opt/cuonghoangdev/frontend/.next/static/chunks/ | wc -l
            fi
          "

      - name: Start fresh container with the host .next baked in
        run: |
          ssh vps "
            cd /opt/cuonghoangdev

            echo '=== Check that .next is present ==='
            ls /opt/cuonghoangdev/frontend/.next/BUILD_ID 2>&1 || (echo 'No BUILD_ID yet - aborting' && exit 1)
            echo ''
            echo '=== Start a fresh frontend container with the build ==='
            # Use docker compose to bring up the frontend with the same image but
            # this time the .next baked into the image (because the image is built
            # from frontend/) — but we also override with the latest .next from host.
            docker compose up -d --force-recreate --no-deps frontend 2>&1

            echo ''
            echo '=== Wait for frontend to come up ==='
            for i in \$(seq 1 30); do
              if curl -sf http://localhost:3000/ >/dev/null 2>&1; then
                echo \"Frontend is UP after \${i} checks\"
                break
              else
                echo \"Waiting... (\$i/30)\"
                sleep 3
              fi
            done

            echo ''
            echo '=== Final status ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}' | head -10
          "

      - name: Verify on production
        run: |
          sleep 10
          echo "=== /social status ==="
          curl -sI --max-time 10 "https://cuongthai.com/social" 2>&1 | head -3
          echo ""
          echo "=== Hit the chunk that should contain MESSAGES_DISABLED ==="
          curl -s --max-time 10 "https://cuongthai.com/social" 2>&1 > /tmp/social.html
          for chunk in $(grep -oE '/_next/static/chunks/[a-f0-9-]+\.js' /tmp/social.html | sort -u); do
            CONTENT=$(curl -s --max-time 5 "https://cuongthai.com$chunk" 2>&1)
            if echo "$CONTENT" | grep -q 'MESSAGES_DISABLED'; then
              echo "*** FOUND MESSAGES_DISABLED in: $chunk"
            fi
            if echo "$CONTENT" | grep -q 'MessageSquare'; then
              echo "*** FOUND MessageSquare in: $chunk"
            fi
          done
