name: VPS - Verify new code in frontend container

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Check git HEAD on VPS + container filesystem
        run: |
          ssh vps "
            echo '=== Git HEAD on VPS ==='
            cd /opt/cuonghoangdev
            git log --oneline -3 2>&1

            echo ''
            echo '=== Check our edit in source on VPS ==='
            grep -c 'handleMessage' frontend/src/components/social/SocialRightWidget.tsx 2>&1 || echo 'no source'
            grep -c 'MESSAGES_DISABLED' frontend/src/components/social/SocialRightWidget.tsx 2>&1 || echo 'no source'

            echo ''
            echo '=== Image + container info ==='
            docker inspect cuonghoangdev_frontend --format '{{.Config.Image}}' 2>&1
            docker ps --filter name=cuonghoangdev_frontend --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'

            echo ''
            echo '=== Built chunks in container ==='
            docker exec cuonghoangdev_frontend sh -c 'ls .next/static/chunks/ 2>/dev/null | head -10' || true

            echo ''
            echo '=== Search for new code in built chunks ==='
            docker exec cuonghoangdev_frontend sh -c 'grep -lE \"MESSAGES_DISABLED|MessageSquare|Đang mở|useMessagingStore\" .next/static/chunks/*.js 2>/dev/null' || true
          "
