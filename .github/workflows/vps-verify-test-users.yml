name: VPS - Find test user + mark email verified

on:
  workflow_dispatch:

jobs:
  fix-user:
    runs-on: ubuntu-24.04

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_PRIVATE_KEY_B64: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_PRIVATE_KEY_B64}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf 'Host vps\n    HostName %s\n    User %s\n    IdentityFile ~/.ssh/deploy_key\n    StrictHostKeyChecking no\n' \
            "${{ secrets.VPS_HOST }}" "${{ secrets.VPS_USER }}" > ~/.ssh/config

      - name: Mark test users email verified
        run: |
          ssh vps "
            docker exec cuonghoangdev_postgres psql -U cuonghoangdev -d cuonghoangdev -c \
              \"UPDATE users SET email_verified = true, is_email_verified = true WHERE username IN ('testmsga_001', 'testmsgb_001', 'testmsg_otp1');\" 2>&1
            docker exec cuonghoangdev_postgres psql -U cuonghoangdev -d cuonghoangdev -c \
              \"SELECT id, username, email_verified, is_email_verified FROM users WHERE username LIKE 'testmsg%';\" 2>&1
          "
