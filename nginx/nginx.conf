# ============================================================
# Nginx Configuration - All-in-One VPS
#
# Responsibilities:
# 1. SSL termination (HTTPS)
# 2. Static file serving for /uploads/* (bypasses Node.js)
# 3. Reverse proxy to Next.js frontend and Node.js backend
# 4. Gzip compression
# 5. Cache headers for static assets
# 6. Rate limiting
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=2s;

    # ─── Performance ──────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ─── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/ttf
        font/eot
        font/otf
        image/svg+xml
        image/x-icon;

    # ─── Buffer Sizes ────────────────────────────────────
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 500m;  # Allow large uploads (nginx handles them, backend processes)
    output_buffers 1 32k;
    postpone_output 1460;

    # ─── Timeouts ────────────────────────────────────────
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ─── Rate Limiting Zones ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

    # ─── Upstream Backends ───────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # ─── Server Blocks ───────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name cuongthai.com www.cuongthai.com api.cuongthai.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server ─────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name cuongthai.com www.cuongthai.com;

        # SSL Certificate (Let's Encrypt) - mounted from archive
        ssl_certificate /etc/letsencrypt/archive/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/archive/privkey.pem;

        # SSL Security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ─── ROOT: Next.js Frontend ──────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;

            # Next.js specific headers
            proxy_set_header X-Forwarded-Host $host;
        }

        # ─── STATIC FILES: /uploads/* served by Nginx directly
        #    This bypasses Node.js completely — maximum performance
        #    Files are read from the host SSD volume mounted at
        #    /var/www/cuonghoangdev/uploads (mapped from uploads_data volume)
        location /uploads/ {
            # Point to the mounted Docker volume
            alias /var/www/cuonghoangdev/uploads/;

            # Security: prevent directory listing
            autoindex off;

            # Sendfile + AIO for optimal disk I/O
            sendfile on;
            aio threads;
            directio 4k;

            # Aggressive caching for static assets
            location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|avif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable, stale-while-revalidate=2592000";
                add_header X-Content-Type-Options "nosniff";
                add_header Vary "Accept-Encoding";
            }

            # Audio files (music)
            location ~* \.(mp3|wav|ogg|flac|aac|m4a)$ {
                expires 7d;
                add_header Cache-Control "public, stale-while-revalidate=86400";
                add_header X-Content-Type-Options "nosniff";
                # Allow range requests for streaming
                add_header Accept-Ranges bytes;
            }

            # Video files
            location ~* \.(mp4|webm|mov|avi|mkv)$ {
                expires 1d;
                add_header Cache-Control "public, stale-while-revalidate=86400";
                add_header X-Content-Type-Options "nosniff";
                add_header Accept-Ranges bytes;
            }

            # Documents
            location ~* \.(pdf|doc|docx|xls|xlsx|zip|txt|md)$ {
                expires 30d;
                add_header Cache-Control "public";
                add_header X-Content-Type-Options "nosniff";
            }

            # Fonts
            location ~* \.(woff|woff2|ttf|eot|otf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff";
            }

            # CSS / JS
            location ~* \.(css|js)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff";
            }

            # Default: no cache for unknown types
            expires -1;
        }

        # ─── API: Proxy to Node.js Backend ───────────────
        location /api/v1/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffers
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # ─── Auth endpoints: stricter rate limiting ───────
        location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password)$ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ─── Error Pages ─────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ─── API Server Block (separate domain) ─────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name api.cuongthai.com;

        ssl_certificate /etc/letsencrypt/archive/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/archive/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # CORS preflight
        location / {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type 'text/plain charset=UTF-8';
                return 204;
            }

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 15s;
            proxy_send_timeout 120s;   # Long timeout for streaming
            proxy_read_timeout 120s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }
    }
}
