# ============================================================
# Nginx Configuration - All-in-One VPS
#
# Responsibilities:
# 1. SSL termination (HTTPS)
# 2. Static file serving for /uploads/* (bypasses Node.js)
# 3. Reverse proxy to Next.js frontend and Node.js backend
# 4. Gzip compression
# 5. Cache headers for static assets
# 6. Rate limiting
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=2s;

    # ─── Performance ──────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ─── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/ttf
        font/eot
        font/otf
        image/svg+xml
        image/x-icon;

    # ─── Buffer Sizes ────────────────────────────────────
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 500m;  # Allow large uploads (nginx handles them, backend processes)
    output_buffers 1 32k;
    postpone_output 1460;

    # ─── Timeouts ────────────────────────────────────────
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ─── Rate Limiting Zones ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

    # ─── Upstream Backends ───────────────────────────────
    upstream frontend {
        server cuonghoangdev_frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server cuonghoangdev_backend:3001;
        keepalive 32;
    }

    # ─── Server Blocks ───────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name cuongthai.com www.cuongthai.com api.cuongthai.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server ─────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name cuongthai.com www.cuongthai.com api.cuongthai.com;

        # SSL Certificate (Let's Encrypt) - mounted from archive
        ssl_certificate /etc/letsencrypt/archive/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/archive/privkey.pem;

        # SSL Security
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ─── Next.js static assets (_next/static/*) ───────
        # Long-lived, content-hashed files. Next.js fingerprints
        # every chunk by its hash (e.g. `page-570d81b649023205.js`)
        # so a new build always ships new filenames — the browser
        # is safe to cache these for a year without revalidation.
        #
        # This block is matched BEFORE the catch-all `location /`
        # below (nginx tries the most specific match first), so
        # static chunks keep their immutable cache headers even
        # though the rest of the site is served as no-cache.
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;

            # Long-lived immutable cache — see comment above.
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            proxy_hide_header Expires;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 365d;
        }

        # ─── ROOT: Next.js Frontend ──────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;

            # Next.js specific headers
            proxy_set_header X-Forwarded-Host $host;

            # Drop the upstream Cache-Control so we can replace it
            # with our own (Next.js by default emits
            # `s-maxage=31536000, stale-while-revalidate` for SSR
            # pages, which lets browsers cache HTML for a year and
            # causes the "ChunkLoadError: Loading chunk N failed"
            # bug every time we `docker compose up --build` a new
            # image with renamed chunk hashes).
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            proxy_hide_header Expires;

            # Force revalidation for HTML/RSC responses so the
            # browser never serves a stale page that still
            # references the previous build's chunk hashes.
            #
            # `_next/static/*` files themselves are handled by the
            # more specific `location /_next/static/` block above
            # (long-lived + immutable), so they don't fall through
            # to this rule.
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ─── API: Proxy to Node.js Backend ───────────────
        location /api/v1/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Cookie $http_cookie;

            # SSE streaming: disable all buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Timeouts (SSE needs long timeout)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ─── Public music endpoints: let backend Cache-Control through ──────────
        # More specific than /api/v1/ above, so nginx does NOT add no-cache.
        # Backend sets Cache-Control: public, max-age=60, stale-while-revalidate=300
        # for /music/tracks, /music/playlists, and /music/playlists/:id.
        location ~ ^/api/v1/music/(tracks|playlists)$ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Cookie $http_cookie;

            # Allow backend Cache-Control headers through (do NOT add no-cache)
            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─── Public academy/courses endpoints: let backend Cache-Control through ──
        # Same pattern as music: more specific than /api/v1/ so nginx doesn't
        # add no-cache. Backend sets Cache-Control for these endpoints.
        location ~ ^/api/v1/(academy/semesters|courses/semester/.+)$ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Cookie $http_cookie;

            proxy_buffering off;
            proxy_cache off;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ─── SSE streaming endpoint: explicitly no buffering ─────
        location /api/v1/ai/chat {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Cookie $http_cookie;

            # Force no buffering for SSE
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_request_buffering off;

            # Disable nginx buffering to allow streaming
            proxy_set_header X-Accel-Buffering no;

            # Long timeouts for streaming
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ─── Socket.IO WebSocket endpoint (Direct Messaging) ─────
        # The `Connection: upgrade` header is what flips the protocol
        # from HTTP to WebSocket. Long timeouts so the socket stays
        # idle through the user's lunch break without being torn
        # down by an aggressive proxy.
        location /socket.io/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;

            # 24h idle timeout — Socket.IO sends pings every 25s
            # so a healthy connection won't be cut off.
            proxy_connect_timeout 10s;
            proxy_send_timeout 86400s;
            proxy_read_timeout 86400s;
        }

        # ─── Auth endpoints: stricter rate limiting ───────
        location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password)$ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ─── STATIC FILES: /uploads/* served by Nginx directly
        #    This bypasses Node.js completely — maximum performance
        #    Files are read from the Docker volume mount at
        #    /var/www/cuongthai.com/uploads (mapped from uploads_data volume)
        location /uploads/ {
            # Point to the mounted Docker volume
            alias /var/www/cuongthai.com/uploads/;
            # Fix: ensure /uploads/images/file.jpg → /var/www/cuongthai.com/uploads/images/file.jpg
            # (nginx alias strips the location prefix /uploads/ and appends remainder to alias path)

            # Security: lesson documents are gated on enrollment.
            # The /api/v1/courses/documents/:id/download endpoint
            # checks the user's enrollment (active + not expired)
            # before issuing the 302 to fileUrl. Direct access to
            # the underlying file would bypass that gate, so we
            # return 403 here. The `^~` modifier is critical —
            # without it the regex locations below (e.g. `\.zip$`)
            # would win precedence over the prefix match and the
            # block would never fire.
            location ^~ /uploads/lesson-documents/ {
                return 403;
            }

            # Security: prevent directory listing
            autoindex off;

            # Sendfile + AIO for optimal disk I/O
            sendfile on;
            aio threads;
            directio 4k;

            # Aggressive caching for static assets
            location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|avif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable, stale-while-revalidate=2592000";
                add_header X-Content-Type-Options "nosniff";
                add_header Vary "Accept-Encoding";
            }

            # Audio files (music)
            location ~* \.(mp3|wav|ogg|flac|aac|m4a)$ {
                expires 7d;
                add_header Cache-Control "public, stale-while-revalidate=86400";
                add_header X-Content-Type-Options "nosniff";
                # Allow range requests for streaming
                add_header Accept-Ranges bytes;
            }

            # Video files
            location ~* \.(mp4|webm|mov|avi|mkv)$ {
                expires 1d;
                add_header Cache-Control "public, stale-while-revalidate=86400";
                add_header X-Content-Type-Options "nosniff";
                add_header Accept-Ranges bytes;
            }

            # Documents
            location ~* \.(pdf|doc|docx|xls|xlsx|zip|txt|md)$ {
                expires 30d;
                add_header Cache-Control "public";
                add_header X-Content-Type-Options "nosniff";
            }

            # Fonts
            location ~* \.(woff|woff2|ttf|eot|otf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff";
            }

            # CSS / JS
            location ~* \.(css|js)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff";
            }

            # Default: no cache for unknown types
            expires -1;
        }

        # ─── Error Pages ────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
